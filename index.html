/* ============================================
   ДОМ ВДАЛИ — Design tokens & base styles
   v2 · Graphik · #5482FF accent
   ============================================ */

:root {
  /* ── Palette ───────────────────────────── */
  --bg:           #F5F5F5;
  --bg-soft:      #EBEBEB;
  --bg-card:      #FFFFFF;
  --ink:          #031B25;
  --ink-2:        #44515A;
  --ink-3:        #7E8A92;
  --rule:         #E0E0E0;
  --rule-strong:  #C5C5C5;

  --accent:       #031B25;
  --accent-ink:   #031B25;
  --accent-soft:  #EAEAEA;
  --map-accent:   #031B25;
  --map-accent-soft:#E5E8EA;

  /* category tints */
  --tag-rest:     #6B5947;   --tag-rest-bg:  #EDE5D8;
  --tag-hotel:    #4F5F4E;   --tag-hotel-bg: #DDE2DC;
  --tag-museum:   #4A5F6E;   --tag-museum-bg:#D8E0E7;
  --tag-cluster-c:#3D4F6E;   --tag-cluster-bg:#D8DCE8;
  --tag-shop:     #5C5E4A;   --tag-shop-bg:  #E2E0D0;

  --status-okn:   #6B5947;   --status-okn-bg:#EDE5D8;
  --status-icgfo: #4A5F6E;   --status-icgfo-bg:#D8E0E7;
  --status-none:  #7E8A92;   --status-none-bg:#E5E2D8;

  /* admin status */
  --st-new:       #3A5FA0;   --st-new-bg:    #DAE4F2;
  --st-ok:        #4F6B4A;   --st-ok-bg:     #DDE4D2;
  --st-rej:       #8B3A2D;   --st-rej-bg:    #EFD6CD;
  --st-rev:       #8B6B1E;   --st-rev-bg:    #EFE3C2;

  /* ── Type ──────────────────────────────── */
  --f-sans:   'Graphik', -apple-system, 'Helvetica Neue', Arial, sans-serif;
  --f-serif:  'Graphik', -apple-system, 'Helvetica Neue', Arial, sans-serif; /* legacy alias */
  --f-mono:   'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace;

  /* ── Radii / shadow / spacing ─────────── */
  --r-sm: 4px;
  --r:    8px;
  --r-lg: 14px;

  --sh-1: 0 1px 2px rgba(3,27,37,.04), 0 1px 4px rgba(3,27,37,.04);
  --sh-2: 0 2px 4px rgba(3,27,37,.05), 0 8px 24px -8px rgba(3,27,37,.10);
  --sh-3: 0 6px 18px rgba(3,27,37,.10), 0 24px 60px -16px rgba(3,27,37,.18);

  --header-h: 64px;
  --filters-h: 56px;
}

/* ── Reset / base ─────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--f-sans);
  font-weight: 400;
  font-size: 15px;
  line-height: 1.5;
  letter-spacing: -0.005em;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; color: inherit; }
a { color: inherit; }
.mono, .num { font-family: var(--f-mono); font-variant-numeric: tabular-nums lining-nums; }
.serif { font-family: var(--f-sans); }

/* ── Header ───────────────────────────────── */
.hdr {
  position: sticky; top: 0; z-index: 8500;
  background: rgba(246,246,246,.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--rule);
  height: var(--header-h);
}
.hdr-inner {
  height: 100%;
  display: flex; align-items: center; gap: 32px;
  padding: 0 32px;
}
.brand {
  display: flex; align-items: center; gap: 12px;
  text-decoration: none;
  color: var(--ink);
}
.brand-mark {
  font-family: var(--f-sans);
  font-weight: 600;
  font-size: 17px;
  letter-spacing: .04em;
  text-transform: uppercase;
}
.brand-sub {
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--ink-3);
  border-left: 1px solid var(--rule-strong);
  padding-left: 12px;
  align-self: stretch;
  display: flex; align-items: center;
}
.nav { display: flex; gap: 28px; }
.nav a {
  text-decoration: none;
  font-size: 14px;
  font-weight: 400;
  color: var(--ink);
  padding: 6px 0;
  border-bottom: 1px solid transparent;
  transition: border-color .15s, color .15s;
}
.nav a:hover { border-bottom-color: var(--ink); }
.nav a.is-active { border-bottom-color: var(--accent); color: var(--ink); }
.hdr-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

/* ── Buttons ──────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  height: 38px; padding: 0 18px;
  border-radius: var(--r);
  font-size: 14px; font-weight: 500;
  border: 1px solid transparent;
  background: transparent;
  transition: all .15s ease;
  text-decoration: none;
  white-space: nowrap;
  letter-spacing: -.005em;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: var(--accent-ink); }
.btn-ghost {
  border-color: var(--rule-strong);
  color: var(--ink);
  font-weight: 400;
}
.btn-ghost:hover { border-color: var(--ink); background: rgba(0,0,0,.02); }
.btn-quiet {
  color: var(--ink-2);
  font-weight: 400;
}
.btn-quiet:hover { color: var(--ink); }
.btn-sm { height: 32px; padding: 0 12px; font-size: 13px; }
.btn-lg { height: 46px; padding: 0 24px; font-size: 15px; }

/* ── Tags / badges ────────────────────────── */
.tag {
  display: inline-flex; align-items: center; gap: 6px;
  height: 24px; padding: 0 10px;
  border-radius: 999px;
  font-size: 11px;
  font-family: var(--f-mono);
  letter-spacing: .04em;
  text-transform: uppercase;
  font-weight: 500;
}
.tag-rest    { background: var(--tag-rest-bg);    color: var(--tag-rest); }
.tag-hotel   { background: var(--tag-hotel-bg);   color: var(--tag-hotel); }
.tag-museum  { background: var(--tag-museum-bg);  color: var(--tag-museum); }
.tag-cluster { background: var(--tag-cluster-bg); color: var(--tag-cluster-c); }
.tag-shop    { background: var(--tag-shop-bg);    color: var(--tag-shop); }

.badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px;
  font-family: var(--f-mono);
  letter-spacing: .04em;
  padding: 2px 8px;
  border-radius: var(--r-sm);
  font-weight: 500;
}
.badge-okn   { background: var(--status-okn-bg);   color: var(--status-okn); }
.badge-icgfo { background: var(--status-icgfo-bg); color: var(--status-icgfo); }
.badge-none  { background: var(--status-none-bg);  color: var(--status-none); }

/* ── Inputs ───────────────────────────────── */
.field { display: flex; flex-direction: column; gap: 6px; }
.field > label {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 500;
}
.input, .textarea, .select {
  border: none;
  border-bottom: 1px solid var(--rule-strong);
  background: transparent;
  padding: 8px 0;
  font-size: 15px;
  font-family: var(--f-sans);
  font-weight: 400;
  color: var(--ink);
  outline: none;
  transition: border-color .15s;
  width: 100%;
}
.input:focus, .textarea:focus, .select:focus { border-bottom-color: var(--accent); }
.textarea { resize: vertical; min-height: 80px; padding: 8px 0; }
.input::placeholder, .textarea::placeholder { color: var(--ink-3); font-weight: 400; }

/* ── Card ─────────────────────────────────── */
.card {
  background: var(--bg-card);
  border-radius: var(--r);
  box-shadow: var(--sh-1);
  overflow: hidden;
  transition: transform .2s ease, box-shadow .2s ease;
}
.card:hover { transform: translateY(-2px); box-shadow: var(--sh-2); }

/* placeholder image — striped editorial */
.ph-img {
  position: relative;
  background: var(--bg-soft);
  background-image:
    repeating-linear-gradient(
      135deg,
      rgba(3,27,37,.04) 0px, rgba(3,27,37,.04) 1px,
      transparent 1px, transparent 14px
    );
  display: flex; align-items: center; justify-content: center;
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.ph-img::after {
  content: '';
  position: absolute; inset: 8px;
  border: 1px dashed rgba(3,27,37,.12);
  border-radius: 4px;
  pointer-events: none;
}

/* ── Utility ──────────────────────────────── */
.hairline { border-top: 1px solid var(--rule); }
.eyebrow {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 500;
}
.h-title {
  font-family: var(--f-sans);
  font-weight: 500;
  letter-spacing: -.018em;
  line-height: 1.12;
}

/* ── Custom scrollbar (light) ─────────────── */
.scroll-y { overflow-y: auto; }
.scroll-y::-webkit-scrollbar { width: 8px; }
.scroll-y::-webkit-scrollbar-track { background: transparent; }
.scroll-y::-webkit-scrollbar-thumb { background: var(--rule-strong); border-radius: 4px; }
.scroll-y::-webkit-scrollbar-thumb:hover { background: var(--ink-3); }

/* hide scrollbar on horizontal */
.no-scroll-bar::-webkit-scrollbar { display: none; }
.no-scroll-bar { scrollbar-width: none; }

/* keyframes */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
@keyframes slideRight { from { transform: translateX(100%); } to { transform: none; } }

/* ── Leaflet overrides ───────────────────── */
.leaflet-container {
  background: var(--bg-soft);
  font-family: var(--f-sans);
}
.leaflet-popup-content-wrapper {
  border-radius: var(--r);
  box-shadow: var(--sh-2);
  padding: 0;
  overflow: hidden;
}
.leaflet-popup-content { margin: 0; width: 240px !important; }
.leaflet-popup-tip { box-shadow: var(--sh-2); }
.leaflet-control-attribution {
  font-family: var(--f-mono);
  font-size: 9px;
  background: rgba(255,255,255,.7) !important;
}
.dv-marker {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1.5px solid var(--ink);
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--sh-1);
  transition: transform .15s ease;
  cursor: pointer;
}
.dv-marker:hover, .dv-marker.is-active {
  transform: scale(1.15);
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;
}
.dv-marker svg { width: 16px; height: 16px; }

/* small icon helper */
.ic { width: 16px; height: 16px; stroke-width: 1.5; flex-shrink: 0; }
.ic-sm { width: 14px; height: 14px; stroke-width: 1.5; flex-shrink: 0; }
.ic-lg { width: 20px; height: 20px; stroke-width: 1.5; flex-shrink: 0; }


/* ============================================
   Редизайн MVP: marketplace / map-first UI
   Palette: bg #F6F6F6, text #031B25, interface accent #031B25, map accent #5482FF
   ============================================ */
:root{
  --bg:#F6F6F6;
  --bg-soft:#EEF2F7;
  --bg-card:#FFFFFF;
  --ink:#031B25;
  --ink-2:#53636C;
  --ink-3:#7B8990;
  --rule:#E6E9ED;
  --rule-strong:#D7DDE3;
  --accent:#031B25;
  --accent-ink:#031B25;
  --accent-soft:#E7EBED;
  --map-accent:#5482FF;
  --map-accent-soft:#EAF0FF;
  --f-sans: 'Jost', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  --f-serif: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
  --f-mono: 'IBM Plex Mono', ui-monospace, Menlo, Consolas, monospace;
  --r-sm:4px;
  --r:6px;
  --r-lg:8px;
  --sh-1:0 1px 2px rgba(3,27,37,.04), 0 8px 28px rgba(3,27,37,.05);
  --sh-2:0 10px 35px rgba(3,27,37,.10);
  --sh-3:0 18px 70px rgba(3,27,37,.18);
  --header-h:72px;
  --filters-h:53px;
}
body{background:var(--bg); color:var(--ink); font-size:15px; letter-spacing:.01em; font-family:var(--f-sans);}
.hdr{height:var(--header-h); background:#031B25; border-bottom:1px solid rgba(255,255,255,.08);}
.hdr-inner{padding:0 28px; gap:26px;}
.brand-mark{font-size:18px; letter-spacing:.06em; text-transform:uppercase; font-weight:700; font-family:var(--f-serif); color:#fff;}
.brand-sub{font-family:var(--f-sans); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:rgba(255,255,255,.6); border-left:1px solid rgba(255,255,255,.2);}
.nav{gap:4px; padding:0; background:transparent; border:none; border-radius:0; box-shadow:none;}
.nav a{font-size:11px; padding:6px 14px; border-radius:0; border-bottom:1px solid transparent; color:rgba(255,255,255,.7); letter-spacing:.14em; text-transform:uppercase; font-weight:500;}
.nav a:hover{background:transparent; color:#fff; border-bottom:1px solid rgba(255,255,255,.5);}
.nav a.is-active{background:transparent; color:#fff; border-bottom:1px solid #fff;}
.btn{height:42px; border-radius:3px; padding:0 18px; font-weight:500; box-shadow:none; letter-spacing:.1em; text-transform:uppercase; font-size:12px;}
.btn-primary{background:transparent; color:#fff; box-shadow:none; border:1px solid #fff;}
.btn-primary:hover{background:rgba(255,255,255,.1); transform:none;}
.btn-ghost{border-color:var(--rule-strong); background:transparent; color:var(--ink);}
.btn-ghost:hover{border-color:var(--ink); background:transparent; box-shadow:none;}
.btn-quiet{color:var(--ink-2); background:transparent;}
.btn-sm{height:34px; padding:0 13px; font-size:13px;}
.btn-lg{height:50px; padding:0 24px;}
.card{border:1px solid var(--rule); border-radius:4px; box-shadow:0 1px 3px rgba(3,27,37,.06); background:#fff; overflow:hidden;}
.card:hover{transform:translateY(-2px); box-shadow:0 4px 16px rgba(3,27,37,.10); border-color:#B8B8B8;}
.input,.textarea,.select{background:#fff; border:none; border-bottom:1px solid var(--rule-strong); border-radius:0; padding:8px 0; transition:border-color .15s;}
.input:focus,.textarea:focus,.select:focus{border-bottom-color:var(--accent); box-shadow:none;}
.field>label,.eyebrow{font-family:var(--f-sans); font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-3); font-weight:500;}
.h-title{font-family:var(--f-serif); color:var(--ink); letter-spacing:.01em; font-weight:600;}
.mono,.num{font-family:var(--f-sans); font-variant-numeric:tabular-nums lining-nums;}
.tag,.badge{font-family:var(--f-sans); font-size:10px; letter-spacing:.12em; text-transform:uppercase; height:22px; border-radius:3px; font-weight:500;}
.tag-rest,.tag-hotel,.tag-museum,.tag-cluster,.tag-shop{background:var(--accent-soft); color:var(--accent-ink);}
.badge-okn,.badge-icgfo,.badge-none{background:#F2F4F7; color:var(--ink-2);}
.filterbar{background:#F5F5F5!important; border-bottom:1px solid var(--rule)!important; backdrop-filter:none!important;}
.chip{border-color:var(--rule-strong)!important; background:#fff!important; color:var(--ink)!important; box-shadow:none; font-weight:500!important; height:32px!important; padding:0 12px!important; border-radius:3px!important; font-size:11px!important; letter-spacing:.08em!important; text-transform:uppercase!important;}
.chip:hover{border-color:#C9D3DD!important; box-shadow:var(--sh-1);}
.chip[style*="rgb(3, 27, 37)"], .chip.is-active{background:var(--accent-soft)!important; border-color:var(--accent)!important; color:var(--accent-ink)!important;}
.obj-card{display:grid; grid-template-columns:220px 1fr; min-height:190px; border-radius:4px;}
.obj-card .ph-img{height:100%; min-height:168px; aspect-ratio:auto!important;}
.obj-card.is-hl{border-color:var(--ink); box-shadow:0 0 0 2px var(--accent-soft);}
.market-card-body{padding:16px 18px!important; display:grid; grid-template-columns:1fr auto; gap:12px; align-items:start;}
.market-card-meta{display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin-top:10px; color:var(--ink-2); font-size:13px;}
.market-card-score{min-width:60px; border-radius:3px; background:var(--bg-soft); color:var(--ink); padding:8px 10px; text-align:center; font-weight:700; border:1px solid var(--rule);}
.market-card-score small{display:block; font-size:11px; color:var(--ink-2); font-weight:600; margin-top:2px;}
.ph-img{border-radius:0; background:#E8E6E0; background-image:linear-gradient(135deg,#EDE9E0,#E0DDD5)!important;}
.dv-marker{width:32px;height:32px;border-radius:50%;background:#031B25;color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(3,27,37,.3);border:2px solid #fff;transition:.15s;}
.dv-marker svg{width:18px;height:18px;}
.dv-marker.is-active{transform:scale(1.12); background:#fff; color:#031B25; box-shadow:0 4px 12px rgba(3,27,37,.25); border-color:#031B25;}
.leaflet-popup-content-wrapper{border-radius:4px!important; box-shadow:0 4px 16px rgba(3,27,37,.12)!important; overflow:hidden; border:1px solid var(--rule);}
.leaflet-popup-content{margin:0!important; min-width:220px;}
.scroll-y{scrollbar-width:thin; scrollbar-color:#C8D1DA transparent;}
.scroll-y::-webkit-scrollbar{width:10px;}
.scroll-y::-webkit-scrollbar-thumb{background:#C8D1DA;border-radius:999px;border:3px solid transparent;background-clip:padding-box;}
@media (max-width: 900px){
  .nav{display:none;}
  .obj-card{grid-template-columns:128px 1fr; min-height:138px;}
  .obj-card .ph-img{min-height:138px;}
}

/* ============================================
   Secondary blue accents — #5482FF
   ============================================ */
:root{
  --blue-accent:#5482FF;
  --blue-accent-soft:#EAF0FF;
}

/* карточки: мягкий синий акцент при наведении/выделении */
.obj-card{
  position:relative!important;
}
.obj-card::before{
  content:'';
  position:absolute;
  left:0;
  top:22px;
  bottom:22px;
  width:3px;
  border-radius:0 999px 999px 0;
  background:transparent;
  transition:background .18s ease, opacity .18s ease;
  z-index:2;
}
.obj-card:hover,
.obj-card.is-hl{
  border-color:rgba(3,27,37,.25)!important;
  box-shadow:0 0 0 4px rgba(3,27,37,.05), var(--sh-2)!important;
}
.obj-card:hover::before,
.obj-card.is-hl::before{
  background:#031B25;
}

/* плашка типа объекта: синий icon/accent, но сама плашка остаётся спокойной */
.tag{
  border:1px solid rgba(3,27,37,.12)!important;
  box-shadow:0 6px 18px rgba(3,27,37,.04)!important;
}
.tag svg,
.tag .ic-sm{
  color:#031B25!important;
  stroke:#031B25!important;
}
.tag-cluster,
.tag-rest,
.tag-hotel,
.tag-museum,
.tag-shop{
  background:#EAEAEA!important;
  color:#031B25!important;
}

/* адрес, индекс и CTA — больше синего как вторичного акцента */
.market-card-body > div:first-child > div:first-of-type svg{
  color:#031B25!important;
  stroke:#031B25!important;
}
.market-card-score{
  background:#EAEAEA!important;
  color:#031B25!important;
}
.market-card-score small{
  color:#53636C!important;
}
.market-card-body .badge[style*="accent-soft"]{
  background:#EAEAEA!important;
  color:#031B25!important;
}

/* сортировка/поля: синий focus-ring */
.input:focus,
.textarea:focus,
.select:focus,
.sort-select:focus{
  border-color:#031B25!important;
  box-shadow:0 0 0 4px #EAEAEA!important;
}

/* переключатель режима: активная иконка/состояние чуть более продуктовые */
.view-switch .btn svg{
  transition:color .15s ease, stroke .15s ease;
}
.view-switch .btn:not([style*="rgb(3, 27, 37)"]) svg{
  color:#031B25!important;
  stroke:#031B25!important;
}

/* карта и попапы */
.leaflet-popup-content-wrapper{
  border-color:rgba(3,27,37,.15)!important;
}
.dv-marker{
  background:#031B25!important;
  box-shadow:0 10px 25px rgba(84,130,255,.35),0 0 0 5px rgba(84,130,255,.15)!important;
}

/* в режиме только список — синяя верхняя линия, как аккуратный акцент */
.list-view .obj-card::before{
  left:24px!important;
  right:24px!important;
  top:0!important;
  bottom:auto!important;
  width:auto!important;
  height:3px!important;
  border-radius:0 0 999px 999px!important;
}

/* ============================================
   MOBILE RESPONSIVE OVERRIDES
   ============================================ */
html, body, #root { width: 100%; overflow-x: hidden; min-width: 0; }

/* -- Mobile bottom toggle button -- */
.mobile-bottom-btn {
  position: fixed !important;
  bottom: 20px !important;
  left: 50% !important;
  transform: translateX(-50%) !important;
  z-index: 8000 !important;
  height: 46px !important;
  padding: 0 28px !important;
  border-radius: 3px !important;
  background: #031B25 !important;
  color: #fff !important;
  font-size: 15px !important;
  font-weight: 600 !important;
  border: none !important;
  box-shadow: 0 6px 24px rgba(3,27,37,.25), 0 0 0 4px rgba(3,27,37,.08) !important;
  display: inline-flex !important;
  align-items: center !important;
  gap: 8px !important;
  cursor: pointer !important;
  font-family: var(--f-sans) !important;
  padding-bottom: calc(0px + env(safe-area-inset-bottom, 0px)) !important;
  white-space: nowrap !important;
}
.mobile-bottom-btn:active { transform: translateX(-50%) scale(0.96) !important; }

/* -- Map bounds filter chip -- */
.map-bounds-chip {
  position: absolute !important;
  top: 12px !important;
  left: 50% !important;
  transform: translateX(-50%) !important;
  z-index: 1000 !important;
  height: 34px !important;
  padding: 0 14px !important;
  border-radius: 999px !important;
  background: #fff !important;
  color: var(--ink) !important;
  font-size: 12px !important;
  font-weight: 600 !important;
  border: 1px solid var(--rule) !important;
  box-shadow: var(--sh-2) !important;
  cursor: pointer !important;
  display: inline-flex !important;
  align-items: center !important;
  gap: 6px !important;
  font-family: var(--f-sans) !important;
  white-space: nowrap !important;
}

/* -- Force Leaflet map to not leak z-index -- */
.mobile-map-container {
  position: relative !important;
  z-index: 0 !important;

}

/* ============================================
   TRANSITIONAL STATE (769–1180px)
   Smooth shrinkage between full and mobile.
   Goal: image column tapers gracefully, text
   never overflows or "shifts" the card width.
   ============================================ */

/* Base safeguards — apply at every width so text in the side-by-side
   card layout can shrink inside its grid track. Without min-width:0
   the inner grid items default to min-content and push the score
   column off the card. */
.obj-card { min-width: 0 !important; }
.obj-card > .market-card-body { min-width: 0 !important; }
.market-card-body > div:first-child { min-width: 0 !important; }
.market-card-body > div:first-child > * { min-width: 0 !important; }
.market-card-body h3 {
  min-width: 0 !important;
  overflow-wrap: anywhere;
  word-break: break-word;
}
.market-card-body > div:first-child > div:nth-child(2) span {
  min-width: 0 !important;
  overflow-wrap: anywhere;
  word-break: break-word;
}
.market-card-meta { min-width: 0 !important; }
.market-card-meta > span { min-width: 0; }

/* Container queries on the catalog scroll pane: cards adapt to the
   pane's actual width instead of the viewport, so the transition
   between full and mobile is smooth regardless of split ratio. */
.scroll-y { container-type: inline-size; container-name: catpane; }

/* Wide pane — keep the editorial 220px image column. */
@container catpane (min-width: 560px) {
  .scroll-y .obj-card {
    grid-template-columns: 200px 1fr !important;
    min-height: 180px !important;
  }
  .scroll-y .obj-card .ph-img { min-height: 180px !important; }
  .scroll-y .obj-card .market-card-body {
    grid-template-columns: 1fr auto !important;
    padding: 16px 18px !important;
    gap: 12px !important;
  }
}

/* Medium pane — image narrows, score drops below content
   so the title and address get the full body width. */
@container catpane (min-width: 420px) and (max-width: 559.98px) {
  .scroll-y .obj-card {
    grid-template-columns: clamp(140px, 30cqi, 170px) 1fr !important;
    min-height: 158px !important;
  }
  .scroll-y .obj-card .ph-img { min-height: 158px !important; }
  .scroll-y .obj-card .market-card-body {
    grid-template-columns: 1fr !important;
    padding: 13px 14px !important;
    gap: 8px !important;
  }
  .scroll-y .obj-card .market-card-body h3 {
    font-size: 16px !important;
    line-height: 1.2 !important;
    margin-bottom: 4px !important;
  }
  .scroll-y .obj-card .market-card-body > div:first-child > div:nth-of-type(1) {
    font-size: 13px !important;
  }
  .scroll-y .obj-card .market-card-meta {
    font-size: 12px !important;
    gap: 4px 8px !important;
    margin-top: 6px !important;
  }
  .scroll-y .obj-card .market-card-score {
    width: max-content !important;
    min-width: 0 !important;
    padding: 6px 12px !important;
    font-size: 16px !important;
    display: inline-flex !important;
    align-items: center !important;
    gap: 6px !important;
    margin-top: 2px !important;
  }
  .scroll-y .obj-card .market-card-score small {
    display: inline !important;
    margin: 0 0 0 4px !important;
    font-size: 10px !important;
  }
  .scroll-y .obj-card .market-card-body .badge {
    font-size: 10px !important;
    height: 22px !important;
    padding: 0 8px !important;
    white-space: nowrap !important;
  }
}

/* Narrow pane — stack vertically (image on top), same as mobile.
   This is the cleanest way to keep text from cramping. */
@container catpane (max-width: 419.98px) {
  .scroll-y .obj-card {
    grid-template-columns: 1fr !important;
    min-height: 0 !important;
  }
  .scroll-y .obj-card > div:first-child {
    height: 160px !important;
    min-height: 160px !important;
    width: 100% !important;
  }
  .scroll-y .obj-card .ph-img {
    min-height: 160px !important;
    width: 100% !important;
    border-radius: 0 !important;
  }
  .scroll-y .obj-card .market-card-body {
    grid-template-columns: 1fr !important;
    padding: 14px 14px 16px !important;
    gap: 8px !important;
  }
  .scroll-y .obj-card .market-card-body h3 {
    font-size: 17px !important;
    line-height: 1.2 !important;
  }
  .scroll-y .obj-card .market-card-meta {
    font-size: 12px !important;
    gap: 6px !important;
    margin-top: 6px !important;
  }
  .scroll-y .obj-card .market-card-score {
    width: max-content !important;
    min-width: 0 !important;
    padding: 6px 12px !important;
    font-size: 16px !important;
    display: inline-flex !important;
    align-items: center !important;
    gap: 6px !important;
  }
  .scroll-y .obj-card .market-card-score small {
    display: inline !important;
    margin: 0 0 0 4px !important;
    font-size: 10px !important;
  }
  .scroll-y .obj-card::before { display: none !important; }
}

/* Lower transitional band for the list (grid) view —
   tighten typography so text doesn't push past the card edge. */
@media (min-width: 769px) and (max-width: 900px) {
  .list-view .market-card-body h3 {
    font-size: clamp(17px, 2.4vw, 20px) !important;

function StatusBadge({ s }) {

}

/* ── Photo placeholder (varies by id) ───── */
function Photo({ obj, ratio = '3 / 2', label, fill }) {
  // Vary stripe color subtly by object id hash
  const h = (obj?.id || 'x').split('').reduce((a, c) => a + c.charCodeAt(0), 0) % 360;
  const tint = `oklch(0.86 0.025 ${h})`;
  const tint2 = `oklch(0.78 0.035 ${h})`;
  const TI = TYPE_ICONS[obj?.type] || 'building';
  const sizeStyle = fill || ratio === 'auto' ?
  { width: '100%', height: '100%' } :
  { aspectRatio: ratio };
  return (
    <div className="ph-img" style={{
      ...sizeStyle,
      background: `linear-gradient(${tint}, ${tint2})`
    }}>
      <div style={{
        position: 'absolute', inset: 0,
        backgroundImage: 'repeating-linear-gradient(135deg, rgba(3,27,37,.05) 0 1px, transparent 1px 18px)'

}

/* ── Map (Leaflet) ──────────────────────── */
function MapPane({ objects, hoverId, setHoverId, onOpen, onBoundsChange }) {
  const ref = useRef(null);
  const mapRef = useRef(null);
  const markersRef = useRef({});

  useEffect(() => {
    if (mapRef.current) return;
    const map = L.map(ref.current, {
      center: [59, 50],
      zoom: 3,
      zoomControl: false,
      attributionControl: true,
      minZoom: 3,
      worldCopyJump: true
    });
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    // CartoDB Positron — neutral, editorial-friendly
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap, © CartoDB',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
      attribution: '',
      subdomains: 'abcd',
      maxZoom: 19,
      pane: 'overlayPane'
    }).addTo(map);
    mapRef.current = map;
    // Store reference on DOM element for external invalidateSize
    ref.current._leaflet_map = map;

    // Map bounds change tracking
    if (onBoundsChange) {
      const emitBounds = () => onBoundsChange(map.getBounds());
      map.on('moveend', emitBounds);
      map.on('zoomend', emitBounds);
    }
  }, []);

  // Sync markers with filtered list
  useEffect(() => {
    const map = mapRef.current;
    if (!map) return;
    // remove markers not in list
    const ids = new Set(objects.map((o) => o.id));
    Object.entries(markersRef.current).forEach(([id, m]) => {
      if (!ids.has(id)) {map.removeLayer(m);delete markersRef.current[id];}
    });
    // add new
    objects.forEach((o) => {
      if (markersRef.current[o.id]) return;
      const iconName = TYPE_ICONS[o.type] || 'building';
      const html = `<div class="dv-marker" data-id="${o.id}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          ${iconSvgPath(iconName)}
        </svg>
      </div>`;
      const icon = L.divIcon({ html, className: 'dv-icon', iconSize: [32, 32], iconAnchor: [16, 16] });
      const m = L.marker([o.lat, o.lng], { icon }).addTo(map);
      m.bindPopup(popupHtml(o), { closeButton: false, offset: [0, -10] });
      m.on('mouseover', () => {setHoverId(o.id);m.openPopup();});
      m.on('mouseout', () => {setHoverId(null);});
      m.on('click', () => onOpen(o));
      m.on('popupopen', () => {
        const popupEl = m.getPopup()?.getElement();
        if (popupEl) {
          popupEl.style.cursor = 'pointer';
          popupEl.addEventListener('click', () => onOpen(o));
        }
      });
      markersRef.current[o.id] = m;
    });
    // always fit to results, with a sane maxZoom
    if (objects.length > 0) {
      const b = L.latLngBounds(objects.map((o) => [o.lat, o.lng]));
      map.fitBounds(b, { padding: [60, 60], maxZoom: objects.length === 1 ? 13 : 7 });
    }
  }, [objects]);

  // Highlight on hover
  useEffect(() => {
    Object.entries(markersRef.current).forEach(([id, m]) => {
      const el = m.getElement()?.querySelector('.dv-marker');
      if (el) el.classList.toggle('is-active', id === hoverId);
    });
    if (hoverId && markersRef.current[hoverId]) {
      markersRef.current[hoverId].openPopup();
    }
  }, [hoverId]);

  return <div ref={ref} style={{ width: '100%', height: '100%' }} />;
}

function iconSvgPath(name) {
  // mirror of icons.jsx for use in raw HTML markers
  const map = {
    cup: '<path d="M4 8h14v6a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5V8Z"/><path d="M18 9h2a3 3 0 0 1 0 6h-2M4 21h14"/>',
    bed: '<path d="M3 18V8M3 14h18v4M21 18v-4a2 2 0 0 0-2-2H10v-2H3"/><circle cx="6" cy="10" r="1.5"/>',

function Catalog({ onOpen, viewMode, setViewMode }) {

/* fictional but plausible revenue history per object */
function getRevenueHistory(obj){
  const seed = obj.id.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const base = revBase(obj.revenue);
  if (!base) return null;
  return [2021,2022,2023,2024,2025].map((y,i)=>{
    const noise = ((seed * (i+1)) % 23) / 100 - 0.1;
    const trend = 1 + i*0.07 + noise;
    return { year:y, v: Math.round(base * trend / (1 + 4*0.07)) };
  });
}
function revBase(r){
  if (!r || r === '—') return 0;
  const m = r.match(/([\d.]+)\s*(млн|млрд)/);
  if (!m) return 0;
  return Math.round(parseFloat(m[1]) * (m[2]==='млрд'?1000:1));
}

                      <I name="arrow-up" className="ic-sm" style={{transform: delta < 0 ? 'rotate(180deg)' : 'none'}}/>

        {/* RIGHT — meta sidebar */}

            <div style={{display:'flex', alignItems:'baseline', gap:6, marginBottom:12}}>
              <span className="serif" style={{fontSize:44, lineHeight:1, fontWeight:400}}>{obj.rating.toFixed(1)}</span>
              <span className="mono" style={{fontSize:13, color:'var(--ink-3)'}}>/ 10</span>
            </div>

          <div>
            <div className="eyebrow" style={{marginBottom:14}}>Контакты</div>
            <div style={{display:'flex', flexDirection:'column', gap:10, fontSize:14}}>

              <ContactRow icon="mail"  label={`info@${obj.id}.ru`}/>
              {obj.tg && <ContactRow icon="tg" label={obj.tg}/>}
              {obj.vk && <ContactRow icon="globe" label={obj.vk}/>}
              {!obj.tg && <ContactRow icon="tg" label={`t.me/${obj.id}`}/>}
            </div>
            <button className="btn" style={{marginTop:18, width:'100%', background:'#031B25', color:'#fff', border:'1px solid #031B25', borderRadius:3}}>
              <I name="send" className="ic-sm"/>Связаться
            </button>
          </div>

          <div style={{
            border:'1px solid var(--rule)', borderRadius:'var(--r)', padding:16,

          }}>
            <div style={{display:'flex', justifyContent:'space-between', marginBottom:8}}>
              <span>КООРДИНАТЫ</span>
              <span style={{color:'var(--ink-2)'}}>{obj.lat.toFixed(4)}, {obj.lng.toFixed(4)}</span>

            <div style={{display:'flex', justifyContent:'space-between', marginBottom:8}}>
              <span>ВНЕСЕНО</span>
              <span style={{color:'var(--ink-2)'}}>14.02.2024</span>
            </div>
            <div style={{display:'flex', justifyContent:'space-between'}}>
              <span>ОБНОВЛЕНО</span>
              <span style={{color:'var(--ink-2)'}}>02.05.2026</span>

          </div>
        </aside>
      </div>

  );
}

function labelForPeriod(id){
  const p = window.DV_DATA.periods.find(x=>x.id===id);
  return p ? p.label : '';
}

function SectionHeader({ eyebrow, title, icon }) {
  return (
    <div style={{display:'flex', alignItems:'center', gap:14, borderBottom:'1px solid var(--rule)', paddingBottom:14}}>
      <div style={{
        width:36, height:36, borderRadius:'50%',
        border:'1px solid var(--rule-strong)',
        display:'flex', alignItems:'center', justifyContent:'center',
        color:'var(--ink-2)',
        flexShrink:0,
      }}>
        <I name={icon} className="ic-sm"/>
      </div>
      <h2 className="h-title" style={{margin:0, fontSize:22}}>{title}</h2>
    </div>
  );
}
function ContactRow({ icon, label }) {
  return (
    <div style={{display:'flex', alignItems:'center', gap:10, minWidth:0}}>
      <div style={{width:32, height:32, borderRadius:'50%', border:'1px solid var(--rule)', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--ink-2)', flexShrink:0}}>
        <I name={icon} className="ic-sm"/>
      </div>
      <span style={{fontFamily:'var(--f-mono)', fontSize:13, color:'var(--ink-2)', overflowWrap:'anywhere', wordBreak:'break-word', minWidth:0}}>{label}</span>
    </div>
  );
}

/* ── Modal wrapper ──────────────────────── */
function DetailModal({ obj, onClose, savedIds, toggleSaved }) {
  useEffect(() => {
    const h = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    document.body.style.overflow = 'hidden';
    return () => { window.removeEventListener('keydown', h); document.body.style.overflow = ''; };
  }, [onClose]);
  if (!obj) return null;
  return (
    <div style={{
      position:'fixed', inset:0, zIndex:9000,
      background:'rgba(3,27,37,.32)', backdropFilter:'blur(4px)',
      display:'flex', justifyContent:'flex-end',
      animation:'fadeIn .2s ease',
    }} onClick={onClose}>
      <div className="detail-modal-inner scroll-y" style={{
        background:'var(--bg)',
        width:'min(1100px, 92vw)',
        height:'100vh',
        overflowY:'auto',
        boxShadow:'var(--sh-3)',
        animation:'slideRight .25s ease',
      }}
        onClick={e=>e.stopPropagation()}>
        <div style={{
          position:'sticky', top:0, zIndex:5,
          padding:'12px 20px',
          paddingTop:'calc(12px + env(safe-area-inset-top, 0px))',
          background:'#F6F6F6',
          backdropFilter:'blur(8px)',
          borderBottom:'1px solid var(--rule)',
          display:'flex', alignItems:'center', justifyContent:'space-between',
        }}>
          <span></span>
          <button onClick={onClose} className="btn btn-ghost btn-sm" style={{height:30}}>
            <I name="close" className="ic-sm"/>Закрыть
          </button>
        </div>
        <DetailBody obj={obj} savedIds={savedIds} toggleSaved={toggleSaved}/>
      </div>
    </div>
  );
}

Object.assign(window, { DetailModal, DetailBody });

  </script>
  <script type="text/babel">
/* ============================================
   Add Object — multi-step wizard
   ============================================ */
/* eslint-disable */

function AddObjectForm({ onClose }) {
  const [step, setStep] = useState(1);
  const [data, setData] = useState({
    name: '', type: '', addr: '', desc: '', openDate: '',
    period: '', status: '', history: '', photos: [],
    site: '', phone: '', email: '', revenue: '', consent: false,
    vk: '', tg: '', social: '',
  });
  const [errors, setErrors] = useState({});
  const [submitted, setSubmitted] = useState(false);

  const set = (k, v) => setData(d => ({...d, [k]: v}));

  const validate = (s) => {
    const e = {};
    if (s === 1) {
      if (!data.name)     e.name = 'Укажите название';
      if (!data.type)     e.type = 'Выберите тип';
      if (!data.addr)     e.addr = 'Укажите адрес';
      if (!data.desc)     e.desc = 'Добавьте описание';
      if (!data.openDate) e.openDate = 'Укажите дату открытия';
      else if (data.openDate > new Date().toISOString().slice(0,7)) e.openDate = 'Объект должен уже работать';
    }
    if (s === 2) {
      if (!data.status) e.status = 'Выберите статус';
    }
    if (s === 3) {
      if (!data.email)   e.email = 'Укажите email';
      if (!data.consent) e.consent = 'Нужно согласие';
    }
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const next = () => { if (validate(step)) setStep(s=>s+1); };
  const prev = () => setStep(s => Math.max(1, s-1));
  const submit = () => { if (validate(3)) setSubmitted(true); };

  if (submitted) return <SuccessScreen onClose={onClose}/>;

  return (
    <div style={{maxWidth:680, margin:'0 auto', padding:'40px 24px 80px'}}>


      {/* Progress */}
      <div style={{display:'flex', alignItems:'center', gap:0, marginBottom:40}}>
        {[1,2,3].map((s, i) => (
          <React.Fragment key={s}>
            <div style={{
              display:'flex', alignItems:'center', gap:10,
              opacity: s <= step ? 1 : .4,
            }}>
              <div style={{
                width:32, height:32, borderRadius:'50%',
                border:`1.5px solid ${s < step ? 'var(--accent)' : s === step ? 'var(--ink)' : 'var(--rule-strong)'}`,
                background: s < step ? 'var(--accent)' : 'transparent',
                color: s < step ? '#fff' : (s===step ? 'var(--ink)' : 'var(--ink-3)'),
                display:'flex', alignItems:'center', justifyContent:'center',
                fontFamily:'var(--f-mono)', fontSize:13,
                transition:'all .2s',
              }}>
                {s < step ? <I name="check" className="ic-sm"/> : s}
              </div>
              <div>
                <div className="mono" style={{fontSize:10, color:'var(--ink-3)', letterSpacing:'.14em'}}>ШАГ {s}</div>
              </div>
            </div>
            {i < 2 && (
              <div style={{
                flex:1, height:1,
                background: s < step ? 'var(--accent)' : 'var(--rule-strong)',
                margin:'0 16px',
                transition:'background .2s',
              }}/>
            )}
          </React.Fragment>
        ))}
      </div>

      <div key={step} style={{animation:'slideUp .25s ease'}}>
        {step === 1 && <Step1 data={data} set={set} errors={errors}/>}
        {step === 2 && <Step2 data={data} set={set} errors={errors}/>}
        {step === 3 && <Step3 data={data} set={set} errors={errors}/>}
      </div>

      <div style={{display:'flex', justifyContent:'space-between', marginTop:40, paddingTop:24, borderTop:'1px solid var(--rule)'}}>
        <button className="btn btn-ghost" onClick={step === 1 ? onClose : prev}>
          <I name="chevron-left" className="ic-sm"/>
          {step === 1 ? 'Отмена' : 'Назад'}
        </button>
        {step < 3 ? (
          <button onClick={next} style={{
            display:'inline-flex', alignItems:'center', gap:8,
            height:42, padding:'0 24px', borderRadius:3,
            background:'#031B25', color:'#fff', border:'1px solid #031B25',
            fontSize:12, letterSpacing:'.1em', textTransform:'uppercase',
            fontFamily:'var(--f-sans)', fontWeight:500, cursor:'pointer',
          }}>
            Далее<I name="chevron-right" className="ic-sm"/>
          </button>
        ) : (
          <button onClick={submit} style={{
            display:'inline-flex', alignItems:'center', gap:8,
            height:42, padding:'0 24px', borderRadius:3,
            background:'#031B25', color:'#fff', border:'1px solid #031B25',
            fontSize:12, letterSpacing:'.1em', textTransform:'uppercase',
            fontFamily:'var(--f-sans)', fontWeight:500, cursor:'pointer',
          }}>
            <I name="send" className="ic-sm"/>Отправить заявку
          </button>
        )}
      </div>
    </div>
  );
}

function FormField({ label, error, hint, required, children }) {
  return (
    <div className="field" style={{marginBottom:24}}>
      <label>
        {label}{required && <span style={{color:'var(--accent)', marginLeft:4}}>*</span>}
      </label>
      {children}
      {hint && !error && <span style={{fontSize:12, color:'var(--ink-3)'}}>{hint}</span>}
      {error && <span style={{fontSize:12, color:'var(--st-rej)'}}>{error}</span>}
    </div>
  );
}

function Step1({ data, set, errors }) {
  return (
    <div>
      <SectionHeader eyebrow="01" title="Основная информация" icon="building"/>
      <div style={{marginTop:28}}>

function ObjectsTab() {
  const [items, setItems] = useState(window.DV_DATA.objects);

  const [selectedObj, setSelectedObj] = useState(null);
  const [editObj, setEditObj] = useState(null);
  const saveEdit = (id, patch) => {
    setItems(xs => xs.map(o => o.id === id ? {...o, ...patch} : o));
    setEditObj(null);
  };

  const filtered = items.filter(o => {
    const q = search.toLowerCase();
    return !q || o.name.toLowerCase().includes(q) || o.city.toLowerCase().includes(q);
  });

  const onDragStart = (i) => setDragIdx(i);
  const onDragOver  = (e, i) => {
    e.preventDefault();
    if (dragIdx === null || dragIdx === i) return;
    setItems(xs => {
      const next = xs.slice();
      const [moved] = next.splice(dragIdx, 1);
      next.splice(i, 0, moved);
      setDragIdx(i);
      return next;
    });
  };
  const onDragEnd = () => setDragIdx(null);

  return (
    <div className="objects-tab-container" style={{padding:'24px 32px'}}>

/* ============================================
   Mobile catalog (separate component)
   ============================================ */
function MobileCatalog({ onOpen }) {
  const D = window.DV_DATA;
  const [view, setView] = useState('map');
  const [filtersOpen, setFiltersOpen] = useState(false);
  const [filters, setFilters] = useState({
    types: [], cities: [], periods: [], statuses: [], sort: 'pop'
  });
  const [mapBounds, setMapBounds] = useState(null);
  const [boundsActive, setBoundsActive] = useState(false);
  const boundsTimerRef = useRef(null);
  const mapContainerRef = useRef(null);

  const filtered = useMemo(() => {
    let xs = D.objects.slice();
    if (filters.types.length) xs = xs.filter((o) => filters.types.includes(o.type));
    if (filters.cities.length) xs = xs.filter((o) => filters.cities.includes(o.city));
    if (filters.periods.length) xs = xs.filter((o) => filters.periods.includes(o.period));
    if (filters.statuses.length) xs = xs.filter((o) => filters.statuses.includes(o.status));
    if (filters.sort === 'pop') xs.sort((a, b) => b.rating - a.rating);
    if (filters.sort === 'rev') xs.sort((a, b) => revNum(b.revenue) - revNum(a.revenue));
    if (filters.sort === 'new') xs.sort((a, b) => b.year - a.year);
    return xs;
  }, [filters]);

  const visibleObjects = useMemo(() => {
    if (!boundsActive || !mapBounds) return filtered;
    return filtered.filter(o => {
      return o.lat >= mapBounds._southWest.lat && o.lat <= mapBounds._northEast.lat &&
             o.lng >= mapBounds._southWest.lng && o.lng <= mapBounds._northEast.lng;
    });
  }, [filtered, mapBounds, boundsActive]);

  const onMapBoundsChange = useCallback((bounds) => {
    if (boundsTimerRef.current) clearTimeout(boundsTimerRef.current);
    boundsTimerRef.current = setTimeout(() => {
      setMapBounds(bounds);
      setBoundsActive(true);
    }, 200);
  }, []);

  const resetBounds = () => {
    setBoundsActive(false);
    setMapBounds(null);
  };

  // invalidateSize when switching to map
  useEffect(() => {
    if (view === 'map' && mapContainerRef.current) {
      const mapEl = mapContainerRef.current.querySelector('.leaflet-container');
      if (mapEl && mapEl._leaflet_id) {
        // find map instance
        setTimeout(() => {
          const containers = mapContainerRef.current.querySelectorAll('.leaflet-container');
          containers.forEach(c => {
            if (c._leaflet_map) c._leaflet_map.invalidateSize();
          });
        }, 100);
      }
    }
  }, [view]);

  const activeCount = filters.types.length + filters.cities.length + filters.periods.length + filters.statuses.length;

  return (
    <div style={{ position: 'relative', minHeight: 'calc(100dvh - var(--header-h))' }}>
      {/* Mobile sticky bar */}
      <div style={{
        position: 'sticky', top: 'var(--header-h)', zIndex: 100,
        background: 'var(--bg)', borderBottom: '1px solid var(--rule)',
        padding: '8px 12px',
        display: 'flex', alignItems: 'center', gap: 8
      }}>
        <button onClick={() => setFiltersOpen(true)} className="btn btn-ghost btn-sm" style={{ flex: '0 0 auto' }}>
          <I name="filter" className="ic-sm" />
          Фильтры {activeCount > 0 && <span style={{
            background: 'var(--accent)', color: '#fff', borderRadius: 999,
            padding: '1px 7px', fontSize: 11, fontFamily: 'var(--f-mono)', marginLeft: 4
          }}>{activeCount}</span>}
        </button>
        <span className="mono" style={{ fontSize: 11, color: 'var(--ink-3)', letterSpacing: '.04em', flex: 1, textAlign: 'center' }}>
          {boundsActive ? visibleObjects.length : filtered.length} объектов
        </span>
        {activeCount > 0 &&
        <button onClick={() => setFilters({ types: [], cities: [], periods: [], statuses: [], sort: 'pop' })}
        style={{ background: 'none', border: 'none', color: 'var(--accent)', fontSize: 12, cursor: 'pointer', flex: '0 0 auto' }}>
            Сбросить
          </button>
        }
      </div>

      {view === 'list' ?
      <div style={{ padding: '12px 14px', paddingBottom: 'calc(80px + env(safe-area-inset-bottom, 0px))', display: 'flex', flexDirection: 'column', gap: 14 }}>
          {boundsActive && <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 4 }}>
            <button onClick={resetBounds} className="map-bounds-chip" style={{ position: 'relative', top: 'auto', left: 'auto', transform: 'none' }}>
              <I name="close" className="ic-sm" />Показать все ({filtered.length})
            </button>
          </div>}
          {visibleObjects.map((o) =>
        <ObjectCard key={o.id} obj={o} onOpen={onOpen} />
        )}
          {visibleObjects.length === 0 &&
          <div className="card" style={{ textAlign: 'center', padding: '36px 12px', color: 'var(--ink-3)' }}>
            Объектов не найдено
          </div>
          }
        </div> :

      <div ref={mapContainerRef} className="mobile-map-container" style={{ height: 'calc(100dvh - var(--header-h) - 52px)', position: 'relative' }}>
          <MapPane objects={filtered} hoverId={null} setHoverId={() => {}} onOpen={onOpen} onBoundsChange={onMapBoundsChange} />
          {boundsActive && <button onClick={resetBounds} className="map-bounds-chip">
            <I name="close" className="ic-sm" />Показать все
          </button>}
        </div>
      }

      {/* Bottom floating toggle button */}
      <button className="mobile-bottom-btn" onClick={() => setView(view === 'map' ? 'list' : 'map')}>
        <I name={view === 'map' ? 'list' : 'map'} className="ic-sm" style={{ color: '#fff' }} />
        {view === 'map' ? `Список (${boundsActive ? visibleObjects.length : filtered.length})` : 'Карта'}
      </button>

      {/* Bottom sheet filters */}
      {filtersOpen &&
      <MobileFilters filters={filters} setFilters={setFilters} count={filtered.length}
      onClose={() => setFiltersOpen(false)}
      onReset={() => setFilters({ types: [], cities: [], periods: [], statuses: [], sort: 'pop' })} />
      }
    </div>);

}

function MobileFilters({ filters, setFilters, count, onClose, onReset }) {
  const T = window.DV_DATA.types;
  const P = window.DV_DATA.periods;
  const S = window.DV_DATA.statuses;

  const toggle = (key, val) => {

    <div style={{ position: 'fixed', inset: 0, zIndex: 9000, background: 'rgba(3,27,37,.4)', display: 'flex', alignItems: 'flex-end', animation: 'fadeIn .15s' }} onClick={onClose}>

        <div style={{ padding: '18px' }}>
          <FilterGroup title="Тип бизнеса">
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              {Object.entries(T).map(([k, v]) =>
              <FilterChip key={k} active={filters.types.includes(k)} onClick={() => toggle('types', k)} icon={TYPE_ICONS[k]}>
                  {v.label}
                </FilterChip>
              )}
            </div>
          </FilterGroup>
          <FilterGroup title="Город">
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
              {C.map((c) =>
              <label key={c} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 0', fontSize: 14 }}>
                  <input type="checkbox" checked={filters.cities.includes(c)} onChange={() => toggle('cities', c)} style={{ accentColor: 'var(--accent)' }} />
                  {c}
                </label>
              )}
            </div>
          </FilterGroup>
          <FilterGroup title="Период постройки">
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>

                  {p.label}
                </FilterChip>
              )}
            </div>
          </FilterGroup>
          <FilterGroup title="Юридический статус">
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              {Object.entries(S).map(([k, v]) =>
              <FilterChip key={k} active={filters.statuses.includes(k)} onClick={() => toggle('statuses', k)}>
                  {v.label}
                </FilterChip>
              )}
            </div>
          </FilterGroup>
        </div>

        <div style={{
          position: 'sticky', bottom: 0, background: '#fff',
          padding: '14px 18px', paddingBottom: 'calc(14px + env(safe-area-inset-bottom, 0px))', borderTop: '1px solid var(--rule)'
        }}>
          <button className="btn btn-primary btn-lg" onClick={onClose} style={{ width: '100%' }}>
            Показать {count} объектов
          </button>
        </div>
      </div>
    </div>);

}

function FilterGroup({ title, children }) {
  return (
    <div style={{ paddingBottom: 18, marginBottom: 18, borderBottom: '1px solid var(--rule)' }}>
      <h3 className="eyebrow" style={{ marginBottom: 12 }}>{title}</h3>
      {children}

}

        </div>

        <div style={{marginTop:64, display:'flex', justifyContent:'center', gap:48, flexWrap:'wrap'}}>
          {[['18', 'объектов'], ['7', 'городов'], ['5', 'категорий']].map(([n, l]) => (
            <div key={l} style={{textAlign:'center'}}>
              <div style={{fontFamily:'var(--f-serif)', fontSize:36, color:'rgba(255,255,255,.9)', fontWeight:600, lineHeight:1}}>{n}</div>
              <div style={{fontFamily:'var(--f-sans)', fontSize:10, letterSpacing:'.18em', textTransform:'uppercase', color:'rgba(255,255,255,.4)', marginTop:6}}>{l}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}



function AddObjectModal({ onClose }) {
  useEffect(() => {
    const h = (e) => {if (e.key === 'Escape') onClose();};
    window.addEventListener('keydown', h);
    document.body.style.overflow = 'hidden';
    return () => {window.removeEventListener('keydown', h);document.body.style.overflow = '';};
  }, []);
  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 9000, background: 'rgba(3,27,37,.32)', backdropFilter: 'blur(4px)', display: 'flex', justifyContent: 'center', overflowY: 'auto', animation: 'fadeIn .2s' }} onClick={onClose}>
      <div className="add-modal-inner scroll-y" style={{
        background: 'var(--bg)', width: '100%', maxWidth: 840, minHeight: '100vh',
        boxShadow: 'var(--sh-3)', animation: 'slideUp .25s ease'
      }} onClick={(e) => e.stopPropagation()}>
        <div style={{
          position: 'sticky', top: 0, zIndex: 5,
          padding: '12px 20px',
          background: '#F6F6F6', backdropFilter: 'blur(8px)',
          borderBottom: '1px solid var(--rule)',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between'
        }}>
          <span></span>
          <button onClick={onClose} className="btn btn-ghost btn-sm" style={{ height: 30 }}>
            <I name="close" className="ic-sm" />Закрыть
          </button>
        </div>
        <AddObjectForm onClose={onClose} />
      </div>
    </div>);

}



function App() {
  const [route, setRoute] = useState(() => {
    const h = location.hash.replace('#', '');
    return ['catalog', 'admin', 'ds'].includes(h) ? h : 'catalog';
  });
  const [showLanding, setShowLanding] = useState(true);
  const [openObj, setOpenObj] = useState(null);
  const [addOpen, setAddOpen] = useState(false);
  const [viewMode, setViewMode] = useState('split');
  const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
  const [isMobile, setIsMobile] = useState(() => window.matchMedia('(max-width: 768px)').matches);
  const [savedIds, setSavedIds] = useState(new Set());
  const [savedOpen, setSavedOpen] = useState(false);
  const toggleSaved = (id) => setSavedIds(s => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });

  useEffect(() => {
    const onResize = () => setIsMobile(window.matchMedia('(max-width: 768px)').matches);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  useEffect(() => {location.hash = route;}, [route]);

  if (showLanding) {
    return <LandingPage onEnter={() => setShowLanding(false)} onAdd={() => { setShowLanding(false); setAddOpen(true); }} />;
  }

  return (
    <div data-screen-label={`Дом вдали · ${route}`}>
      <Header route={route} setRoute={setRoute}
      onAdd={() => setAddOpen(true)}
      mobileMenuOpen={mobileMenuOpen}
      setMobileMenuOpen={setMobileMenuOpen}
      savedCount={savedIds.size}
      onSavedOpen={() => setSavedOpen(true)} />

      <MobileMenu open={mobileMenuOpen} onClose={() => setMobileMenuOpen(false)}
      route={route} setRoute={setRoute} onAdd={() => setAddOpen(true)} />

      {route === 'catalog' && (
      isMobile ?
      <MobileCatalog onOpen={setOpenObj} /> :
      <Catalog onOpen={setOpenObj} viewMode={viewMode} setViewMode={setViewMode} />)
      }
      {route === 'admin' && <AdminPanel />}
      {route === 'ds' && <DesignSystemPage />}

      {openObj && <DetailModal obj={openObj} onClose={() => setOpenObj(null)} savedIds={savedIds} toggleSaved={toggleSaved} />}
      {addOpen && <AddObjectModal onClose={() => setAddOpen(false)} />}
      {savedOpen && <SavedPanel savedIds={savedIds} objects={window.DV_DATA.objects} onClose={() => setSavedOpen(false)} onOpen={setOpenObj} />}
    </div>);

}

Object.assign(window, { App, Header, MobileCatalog, MobileFilters });

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script>
    // Hide splash once rendered
    let tries = 0;
    const t = setInterval(() => {
      const r = document.getElementById('root');
      if ((r && r.children.length) || tries++ > 50) {
        document.getElementById('splash').classList.add('hidden');
        clearInterval(t);
        setTimeout(() => { const s = document.getElementById('splash'); s && s.remove(); }, 400);
      }
    }, 100);
  </script>
</body>
</html>
