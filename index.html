  --rule-strong:  #C9C9C9;

  --accent:       #031B25;          /* interface accent */
  --accent-ink:   #031B25;
  --accent-soft:  #E7EBED;
  --map-accent:   #5482FF;          /* map markers */
  --map-accent-soft:#EAF0FF;

  /* category tints — приглушенные (sand / olive / slate) */
  --tag-rest:     #8B6F4E;   --tag-rest-bg:  #EFE7D8;
  --tag-hotel:    #6B7B6A;   --tag-hotel-bg: #E0E2D6;
  --tag-museum:   #5C6F7E;   --tag-museum-bg:#DBE2E7;
  --tag-cluster-c:#5468A6;   --tag-cluster-bg:#DDE2F2;
  --tag-shop:     #757862;   --tag-shop-bg:  #E4E2D0;

  --status-okn:   #6B5947;   --status-okn-bg:#E9DFC8;
  --status-icgfo: #5E6E7C;   --status-icgfo-bg:#DCE3E8;
  --status-none:  #7E8A92;   --status-none-bg:#E5E2D8;

  /* admin status */
  --st-new:       #3A66E5;   --st-new-bg:    #DDE5FF;
  --st-ok:        #4F6B4A;   --st-ok-bg:     #DDE4D2;
  --st-rej:       #8B3A2D;   --st-rej-bg:    #EFD6CD;
  --st-rev:       #8B6B1E;   --st-rev-bg:    #EFE3C2;

  /* ── Type ──────────────────────────────── */
  --f-sans:   'Graphik', -apple-system, 'Helvetica Neue', Arial, sans-serif;
  --f-serif:  'Graphik', -apple-system, 'Helvetica Neue', Arial, sans-serif;
  --f-mono:   'Graphik', -apple-system, 'Helvetica Neue', Arial, sans-serif;

  /* ── Radii / shadow / spacing ─────────── */
  --r-sm: 4px;
  --r:    8px;
  --r-lg: 14px;

  --sh-1: 0 1px 2px rgba(3,27,37,.04), 0 1px 4px rgba(3,27,37,.04);
  --sh-2: 0 2px 4px rgba(3,27,37,.05), 0 8px 24px -8px rgba(3,27,37,.10);
  --sh-3: 0 6px 18px rgba(3,27,37,.10), 0 24px 60px -16px rgba(3,27,37,.18);

  --header-h: 64px;
  --filters-h: 56px;
}

/* ── Reset / base ─────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--f-sans);
  font-weight: 400;
  font-size: 15px;
  line-height: 1.5;
  letter-spacing: -0.005em;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; color: inherit; }
a { color: inherit; }
.mono, .num { font-family: var(--f-mono); font-variant-numeric: tabular-nums lining-nums; }
.serif { font-family: var(--f-sans); }

/* ── Header ───────────────────────────────── */
.hdr {
  position: sticky; top: 0; z-index: 8500;
  background: #6281FF;
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--rule);
  height: var(--header-h);
}
.hdr-inner {
  height: 100%;
  display: flex; align-items: center; gap: 32px;
  padding: 0 32px;
}
.brand {
  display: flex; align-items: center; gap: 12px;
  text-decoration: none;
  color: var(--ink);
}
.brand-mark {
  font-family: var(--f-sans);
  font-weight: 600;
  font-size: 17px;
  letter-spacing: .04em;
  text-transform: uppercase;
}
.brand-sub {
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--ink-3);
  border-left: 1px solid var(--rule-strong);
  padding-left: 12px;
  align-self: stretch;
  display: flex; align-items: center;
}
.nav { display: flex; gap: 28px; }
.nav a {
  text-decoration: none;
  font-size: 14px;
  font-weight: 400;
  color: var(--ink);
  padding: 6px 0;
  border-bottom: 1px solid transparent;
  transition: border-color .15s, color .15s;
}
.nav a:hover { border-bottom-color: var(--ink); }
.nav a.is-active { border-bottom-color: var(--accent); color: var(--ink); }
.hdr-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

/* ── Buttons ──────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  height: 38px; padding: 0 18px;
  border-radius: var(--r);
  font-size: 14px; font-weight: 500;
  border: 1px solid transparent;
  background: transparent;
  transition: all .15s ease;
  text-decoration: none;
  white-space: nowrap;
  letter-spacing: -.005em;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: var(--accent-ink); }
.btn-ghost {
  border-color: var(--rule-strong);
  color: var(--ink);
  font-weight: 400;
}
.btn-ghost:hover { border-color: var(--ink); background: rgba(0,0,0,.02); }
.btn-quiet {
  color: var(--ink-2);
  font-weight: 400;
}
.btn-quiet:hover { color: var(--ink); }
.btn-sm { height: 32px; padding: 0 12px; font-size: 13px; }
.btn-lg { height: 46px; padding: 0 24px; font-size: 15px; }

/* ── Tags / badges ────────────────────────── */
.tag {
  display: inline-flex; align-items: center; gap: 6px;
  height: 24px; padding: 0 10px;
  border-radius: 999px;
  font-size: 11px;
  font-family: var(--f-mono);
  letter-spacing: .04em;
  text-transform: uppercase;
  font-weight: 500;
}
.tag-rest    { background: var(--tag-rest-bg);    color: var(--tag-rest); }
.tag-hotel   { background: var(--tag-hotel-bg);   color: var(--tag-hotel); }
.tag-museum  { background: var(--tag-museum-bg);  color: var(--tag-museum); }
.tag-cluster { background: var(--tag-cluster-bg); color: var(--tag-cluster-c); }
.tag-shop    { background: var(--tag-shop-bg);    color: var(--tag-shop); }

.badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px;
  font-family: var(--f-mono);
  letter-spacing: .04em;
  padding: 2px 8px;
  border-radius: var(--r-sm);
  font-weight: 500;
}
.badge-okn   { background: var(--status-okn-bg);   color: var(--status-okn); }
.badge-icgfo { background: var(--status-icgfo-bg); color: var(--status-icgfo); }
.badge-none  { background: var(--status-none-bg);  color: var(--status-none); }

/* ── Inputs ───────────────────────────────── */
.field { display: flex; flex-direction: column; gap: 6px; }
.field > label {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 500;
}
.input, .textarea, .select {
  border: none;
  border-bottom: 1px solid var(--rule-strong);
  background: transparent;
  padding: 8px 0;
  font-size: 15px;
  font-family: var(--f-sans);
  font-weight: 400;
  color: var(--ink);
  outline: none;
  transition: border-color .15s;
  width: 100%;
}
.input:focus, .textarea:focus, .select:focus { border-bottom-color: var(--accent); }
.textarea { resize: vertical; min-height: 80px; padding: 8px 0; }
.input::placeholder, .textarea::placeholder { color: var(--ink-3); font-weight: 400; }

/* ── Card ─────────────────────────────────── */
.card {
  background: var(--bg-card);
  border-radius: var(--r);
  box-shadow: var(--sh-1);
  overflow: hidden;
  transition: transform .2s ease, box-shadow .2s ease;
}
.card:hover { transform: translateY(-2px); box-shadow: var(--sh-2); }

/* placeholder image — striped editorial */
.ph-img {
  position: relative;
  background: var(--bg-soft);
  background-image:
    repeating-linear-gradient(
      135deg,
      rgba(3,27,37,.04) 0px, rgba(3,27,37,.04) 1px,
      transparent 1px, transparent 14px
    );
  display: flex; align-items: center; justify-content: center;
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.ph-img::after {
  content: '';
  position: absolute; inset: 8px;
  border: 1px dashed rgba(3,27,37,.12);
  border-radius: 4px;
  pointer-events: none;
}

/* ── Utility ──────────────────────────────── */
.hairline { border-top: 1px solid var(--rule); }
.eyebrow {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 500;
}
.h-title {
  font-family: var(--f-sans);
  font-weight: 500;
  letter-spacing: -.018em;
  line-height: 1.12;
}

/* ── Custom scrollbar (light) ─────────────── */
.scroll-y { overflow-y: auto; }
.scroll-y::-webkit-scrollbar { width: 8px; }
.scroll-y::-webkit-scrollbar-track { background: transparent; }
.scroll-y::-webkit-scrollbar-thumb { background: var(--rule-strong); border-radius: 4px; }
.scroll-y::-webkit-scrollbar-thumb:hover { background: var(--ink-3); }

/* hide scrollbar on horizontal */
.no-scroll-bar::-webkit-scrollbar { display: none; }
.no-scroll-bar { scrollbar-width: none; }

/* keyframes */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
@keyframes slideRight { from { transform: translateX(100%); } to { transform: none; } }

/* ── Leaflet overrides ───────────────────── */
.leaflet-container {
  background: var(--bg-soft);
  font-family: var(--f-sans);
}
.leaflet-popup-content-wrapper {
  border-radius: var(--r);
  box-shadow: var(--sh-2);
  padding: 0;
  overflow: hidden;
}
.leaflet-popup-content { margin: 0; width: 240px !important; }
.leaflet-popup-tip { box-shadow: var(--sh-2); }
.leaflet-control-attribution {
  font-family: var(--f-mono);
  font-size: 9px;
  background: rgba(255,255,255,.7) !important;
}
.dv-marker {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1.5px solid var(--ink);
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--sh-1);
  transition: transform .15s ease;
  cursor: pointer;
}
.dv-marker:hover, .dv-marker.is-active {
  transform: scale(1.15);
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;
}
.dv-marker svg { width: 16px; height: 16px; }

/* small icon helper */
.ic { width: 16px; height: 16px; stroke-width: 1.5; flex-shrink: 0; }
.ic-sm { width: 14px; height: 14px; stroke-width: 1.5; flex-shrink: 0; }
.ic-lg { width: 20px; height: 20px; stroke-width: 1.5; flex-shrink: 0; }


/* ============================================
   Редизайн MVP: marketplace / map-first UI
   Palette: bg #F6F6F6, text #031B25, interface accent #031B25, map accent #5482FF
   ============================================ */
:root{
  --bg:#F6F6F6;
  --bg-soft:#EEF2F7;
  --bg-card:#FFFFFF;
  --ink:#031B25;
  --ink-2:#53636C;
  --ink-3:#7B8990;
  --rule:#E6E9ED;
  --rule-strong:#D7DDE3;
  --accent:#031B25;
  --accent-ink:#031B25;
  --accent-soft:#E7EBED;
  --map-accent:#5482FF;
  --map-accent-soft:#EAF0FF;
  --f-sans: 'Graphik', -apple-system, 'Helvetica Neue', Arial, sans-serif;
  --f-serif: 'Graphik', -apple-system, 'Helvetica Neue', Arial, sans-serif;
  --f-mono: 'Graphik', -apple-system, 'Helvetica Neue', Arial, sans-serif;
  --r-sm:10px;
  --r:18px;
  --r-lg:28px;
  --sh-1:0 1px 2px rgba(3,27,37,.04), 0 8px 28px rgba(3,27,37,.05);
  --sh-2:0 10px 35px rgba(3,27,37,.10);
  --sh-3:0 18px 70px rgba(3,27,37,.18);
  --header-h:72px;
  --filters-h:76px;
}
body{background:var(--bg); color:var(--ink); font-size:15px; letter-spacing:-.01em;}
.hdr{height:var(--header-h); background:#6281FF; backdrop-filter:blur(18px); border-bottom:1px solid rgba(255,255,255,.15);}
.hdr-inner{padding:0 28px; gap:26px;}
.brand-mark{font-size:18px; letter-spacing:-.02em; text-transform:none; font-weight:700;}
.brand-sub{font-family:var(--f-sans); font-size:12px; letter-spacing:-.01em; text-transform:none; color:var(--ink-2); border-left:1px solid var(--rule);}
.nav{gap:10px; padding:5px; background:#fff; border:1px solid var(--rule); border-radius:999px; box-shadow:0 2px 12px rgba(3,27,37,.03);}
.nav a{font-size:14px; padding:8px 14px; border-radius:999px; border-bottom:0; color:var(--ink-2);}
.nav a:hover{background:var(--accent-soft); color:var(--ink); border-bottom:0;}
.nav a.is-active{background:var(--accent); color:#fff; border-bottom:0;}
.btn{height:42px; border-radius:999px; padding:0 18px; font-weight:600; box-shadow:none;}
.btn-primary{background:var(--accent); color:#fff; box-shadow:0 10px 26px rgba(84,130,255,.28);}

.btn-ghost{border-color:var(--rule); background:#fff; color:var(--ink);}

.btn-quiet{color:var(--ink-2); background:transparent;}
.btn-sm{height:34px; padding:0 13px; font-size:13px;}

.card{border:1px solid var(--rule); border-radius:24px; box-shadow:var(--sh-1); background:#fff; overflow:hidden;}

.input,.textarea,.select{background:#fff; border:1px solid var(--rule); border-radius:16px; padding:12px 14px; transition:border-color .15s, box-shadow .15s, background .15s;}
.input:focus,.textarea:focus,.select:focus{border-color:var(--accent); box-shadow:0 0 0 4px var(--accent-soft);}
.field>label,.eyebrow{font-family:var(--f-sans); font-size:12px; letter-spacing:-.005em; text-transform:none; color:var(--ink-2); font-weight:600;}
.h-title{font-family:var(--f-sans); color:var(--ink); letter-spacing:-.035em; font-weight:750;}
.mono,.num{font-family:var(--f-sans); font-variant-numeric:tabular-nums lining-nums;}

.badge-okn,.badge-icgfo,.badge-none{background:#F2F4F7; color:var(--ink-2);}

  .obj-card{grid-template-columns:128px 1fr; min-height:138px;}

/* ============================================
   Secondary blue accents — #5482FF
   ============================================ */
:root{
  --blue-accent:#5482FF;
  --blue-accent-soft:#EAF0FF;
}

/* карточки: мягкий синий акцент при наведении/выделении */
.obj-card{
  position:relative!important;
}
.obj-card::before{
  content:'';
  position:absolute;
  left:0;
  top:22px;
  bottom:22px;
  width:3px;
  border-radius:0 999px 999px 0;
  background:transparent;
  transition:background .18s ease, opacity .18s ease;
  z-index:2;
}
.obj-card:hover,
.obj-card.is-hl{
  border-color:rgba(84,130,255,.42)!important;
  box-shadow:0 0 0 4px rgba(84,130,255,.10), var(--sh-2)!important;
}
.obj-card:hover::before,
.obj-card.is-hl::before{
  background:var(--blue-accent);
}

/* плашка типа объекта: синий icon/accent, но сама плашка остаётся спокойной */
.tag{
  border:1px solid rgba(84,130,255,.16)!important;
  box-shadow:0 6px 18px rgba(84,130,255,.06)!important;
}
.tag svg,
.tag .ic-sm{
  color:var(--blue-accent)!important;
  stroke:var(--blue-accent)!important;
}
.tag-cluster,
.tag-rest,
.tag-hotel,
.tag-museum,
.tag-shop{
  background:var(--blue-accent-soft)!important;
  color:#3159C9!important;
}

/* адрес, индекс и CTA — больше синего как вторичного акцента */
.market-card-body > div:first-child > div:first-of-type svg{
  color:var(--blue-accent)!important;
  stroke:var(--blue-accent)!important;
}
.market-card-score{
  background:var(--blue-accent-soft)!important;
  color:var(--blue-accent)!important;
}
.market-card-score small{
  color:#53636C!important;
}
.market-card-body .badge[style*="accent-soft"]{
  background:var(--blue-accent-soft)!important;
  color:var(--blue-accent)!important;
}

/* сортировка/поля: синий focus-ring */
.input:focus,
.textarea:focus,
.select:focus,
.sort-select:focus{
  border-color:var(--blue-accent)!important;
  box-shadow:0 0 0 4px var(--blue-accent-soft)!important;
}

/* переключатель режима: активная иконка/состояние чуть более продуктовые */
.view-switch .btn svg{
  transition:color .15s ease, stroke .15s ease;
}
.view-switch .btn:not([style*="rgb(3, 27, 37)"]) svg{
  color:var(--blue-accent)!important;
  stroke:var(--blue-accent)!important;
}

/* карта и попапы */
.leaflet-popup-content-wrapper{
  border-color:rgba(84,130,255,.24)!important;
}
.dv-marker{
  background:var(--blue-accent)!important;
  box-shadow:0 10px 25px rgba(84,130,255,.35),0 0 0 5px rgba(84,130,255,.15)!important;
}

/* в режиме только список — синяя верхняя линия, как аккуратный акцент */
.list-view .obj-card::before{
  left:24px!important;
  right:24px!important;
  top:0!important;
  bottom:auto!important;
  width:auto!important;
  height:3px!important;
  border-radius:0 0 999px 999px!important;
}

/* ============================================
   MOBILE RESPONSIVE OVERRIDES
   ============================================ */
html, body, #root { width: 100%; overflow-x: hidden; min-width: 0; }

/* -- Mobile bottom toggle button -- */
.mobile-bottom-btn {
  position: fixed !important;
  bottom: 20px !important;
  left: 50% !important;
  transform: translateX(-50%) !important;
  z-index: 8000 !important;
  height: 50px !important;
  padding: 0 28px !important;
  border-radius: 999px !important;
  background: var(--accent) !important;
  color: #fff !important;
  font-size: 15px !important;
  font-weight: 600 !important;
  border: none !important;
  box-shadow: 0 6px 24px rgba(3,27,37,.25), 0 0 0 4px rgba(3,27,37,.08) !important;
  display: inline-flex !important;
  align-items: center !important;
  gap: 8px !important;
  cursor: pointer !important;
  font-family: var(--f-sans) !important;
  padding-bottom: calc(0px + env(safe-area-inset-bottom, 0px)) !important;
  white-space: nowrap !important;
}
.mobile-bottom-btn:active { transform: translateX(-50%) scale(0.96) !important; }

/* -- Desktop hint: jump to map / back to top (Catalog is never rendered on mobile, but hide explicitly for safety) -- */
.desktop-map-jump-btn {
  position: fixed;
  bottom: 28px;
  right: 40px;
  z-index: 2000;
  height: 48px;
  padding: 0 22px;
  border-radius: 999px;
  background: var(--accent);
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  font-family: var(--f-sans);
  border: none;
  box-shadow: 0 6px 20px rgba(98,129,255,.32), 0 0 0 4px rgba(3,27,37,.05);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  white-space: nowrap;
  transition: transform .15s ease;
}
.desktop-map-jump-btn:hover { transform: translateY(-2px); }
.desktop-map-jump-btn:active { transform: scale(0.96); }
@media (max-width: 768px) {
  .desktop-map-jump-btn { display: none; }
}

/* -- Map bounds filter chip -- */
.map-bounds-chip {
  position: absolute !important;
  top: 12px !important;
  left: 50% !important;
  transform: translateX(-50%) !important;
  z-index: 1000 !important;
  height: 34px !important;
  padding: 0 14px !important;
  border-radius: 999px !important;
  background: #fff !important;
  color: var(--ink) !important;
  font-size: 12px !important;
  font-weight: 600 !important;
  border: 1px solid var(--rule) !important;
  box-shadow: var(--sh-2) !important;
  cursor: pointer !important;
  display: inline-flex !important;
  align-items: center !important;
  gap: 6px !important;
  font-family: var(--f-sans) !important;
  white-space: nowrap !important;
}

/* -- Force Leaflet map to not leak z-index -- */
.mobile-map-container {
  position: relative !important;
  z-index: 0 !important;
  isolation: isolate !important;
}

/* ============================================
   OLD-MONEY PASS — warm paper, serif display,
   muted forest + brass (less «айтишность»)
   ============================================ */
:root{
  --bg:#F4EFE6;
  --bg-soft:#EAE3D5;
  --bg-card:#FBF8F1;
  --ink:#241F18;
  --ink-2:#5E564A;
  --ink-3:#94897A;
  --rule:#E4DBCA;
  --rule-strong:#D3C7B0;
  --accent:#243024;          /* deep forest — interface accent */
  --accent-ink:#1B241B;
  --accent-soft:#E7E2D2;
  --map-accent:#4B6043;      /* forest — map markers */
  --map-accent-soft:#E2E8DC;
  --brass:#9B7B45;
  --brass-soft:#EFE6D2;
  --f-sans:    'Graphik', -apple-system, 'Helvetica Neue', Arial, sans-serif;
  --f-serif:   'Graphik', -apple-system, 'Helvetica Neue', Arial, sans-serif;
  --f-display: 'Graphik', -apple-system, 'Helvetica Neue', Arial, sans-serif;
}

body{ font-family:var(--f-serif); background:var(--bg); color:var(--ink); }
.h-title{ font-family:var(--f-display)!important; font-weight:600; letter-spacing:-.01em; }
.serif{ font-family:var(--f-serif)!important; }

/* eyebrow labels: editorial italic serif instead of techy mono caps */
.eyebrow{
  font-family:var(--f-display);
  font-style:italic;
  text-transform:none;
  letter-spacing:0;
  font-size:13px;
  color:var(--ink-3);
  font-weight:500;
}

/* buttons: calmer, less pill, no blue glow */
.btn{ border-radius:9px; box-shadow:none!important; font-weight:500; }
.btn-primary{ background:var(--accent); box-shadow:none!important; }
.btn-primary:hover{ background:var(--accent-ink); }
.btn-ghost{ background:var(--bg-card); border-color:var(--rule-strong); }
.nav{ border-radius:11px; background:var(--bg-card); border-color:var(--rule); }
.nav a{ border-radius:8px; }

/* header: deep forest */
.hdr{ background:#212A20!important; border-bottom:1px solid rgba(255,255,255,.10)!important; }
.hdr .nav{ background:rgba(255,255,255,.08)!important; border-color:rgba(255,255,255,.12)!important; }
.hdr .nav a.is-active{ background:#F4EFE6!important; color:#212A20!important; }
.hdr .btn-primary{ background:#F4EFE6!important; color:#212A20!important; box-shadow:none!important; }
.hdr .btn-ghost{ background:rgba(255,255,255,.10)!important; color:#fff!important; border-color:rgba(255,255,255,.20)!important; }

/* chips: warm active state */
.chip.is-active, .filterbar .chip.is-active{ background:var(--accent)!important; border-color:var(--accent)!important; color:#F4EFE6!important; }
.chip.is-active svg{ color:#F4EFE6!important; }

/* type tag: parchment + brass */
.tag{ background:var(--brass-soft)!important; color:#6E5326!important; border:1px solid rgba(155,123,69,.30)!important; box-shadow:none!important; }
.tag svg, .tag .ic-sm{ color:var(--brass)!important; stroke:var(--brass)!important; }

/* photo placeholders: warm parchment */
.ph-img{ background:#E7DECC!important; background-image:linear-gradient(135deg,#EFE6D4,#DBCDB2)!important; }

/* map markers: forest, not electric blue */
.dv-marker{ background:var(--map-accent)!important; color:#F4EFE6!important; border:2px solid #FBF8F1!important; box-shadow:0 6px 16px rgba(36,48,36,.28), 0 0 0 4px rgba(75,96,67,.14)!important; }
.dv-marker.is-active{ background:var(--accent)!important; box-shadow:0 8px 20px rgba(27,36,27,.32), 0 0 0 5px var(--map-accent-soft)!important; }
.leaflet-popup-content-wrapper{ border-color:rgba(155,123,69,.24)!important; }

/* ── Region / location picker ─────────────── */
.loc-btn{
  display:inline-flex; align-items:center; gap:8px;
  height:42px; padding:0 16px; border-radius:9px;
  border:1px solid var(--rule-strong); background:var(--bg-card);
  color:var(--ink); font-family:var(--f-serif); font-size:14px; cursor:pointer;
  max-width:min(340px, 100%); transition:border-color .15s;
}
.loc-btn:hover{ border-color:var(--ink-3); }
.loc-btn-label{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
.loc-btn svg{ flex-shrink:0; }
.loc-pop{
  position:absolute; top:calc(100% + 8px); left:0; z-index:60;
  width:320px; max-width:82vw; background:var(--bg-card);
  border:1px solid var(--rule); border-radius:12px;
  box-shadow:0 22px 56px -18px rgba(36,31,24,.45);
  overflow:hidden; animation:slideUp .15s ease;
}
.loc-pop-head, .more-pop-head{
  font-family:var(--f-mono); font-size:11px; letter-spacing:.1em;
  text-transform:uppercase; color:var(--ink-3);
}
.loc-pop-head{ padding:13px 16px 6px; }
.loc-pop-list{ max-height:330px; padding-bottom:8px; }
.loc-region{
  display:flex; align-items:center; justify-content:space-between; gap:8px;
  width:100%; text-align:left; padding:11px 16px; background:none; border:none;
  font-family:var(--f-serif); font-size:14.5px; color:var(--ink); cursor:pointer;
}
.loc-region:hover{ background:var(--accent-soft); }
.loc-region.is-active{ color:var(--accent); font-weight:600; }
.loc-region svg{ color:var(--brass); }
.loc-cities{ padding:2px 12px 8px 28px; display:flex; flex-wrap:wrap; gap:6px; }
.loc-city{
  padding:5px 12px; border-radius:999px; border:1px solid var(--rule-strong);
  background:var(--bg); font-size:13px; cursor:pointer; font-family:var(--f-serif);
}
.loc-city.is-active{ background:var(--accent); color:#F4EFE6; border-color:var(--accent); }

/* ── «Ещё» (period + status) popover ─────── */
.more-btn{
  display:inline-flex; align-items:center; gap:6px;
  height:40px; padding:0 14px; border-radius:9px;
  border:1px solid var(--rule-strong); background:transparent;
  color:var(--ink-2); font-family:var(--f-serif); font-size:13.5px; cursor:pointer;
  transition:.15s;
}
.more-btn:hover{ color:var(--ink); border-color:var(--ink-3); }
.more-pop{
  position:absolute; top:calc(100% + 8px); right:0; z-index:60;
  width:330px; max-width:84vw; background:var(--bg-card);
  border:1px solid var(--rule); border-radius:12px;
  box-shadow:0 22px 56px -18px rgba(36,31,24,.45);
  padding:16px; animation:slideUp .15s ease;
}
.more-pop-group{ margin-bottom:16px; }
.more-pop-group:last-child{ margin-bottom:0; }
.more-pop-head{ margin-bottom:10px; }

/* ── Object detail tabs (Здание / Бизнес / Финансы): filled active state + hover affordance ── */
.detail-tab-btn{
  background:none; border:none; padding:9px 16px;
  font-size:14px; font-family:var(--f-sans); color:var(--ink-3);
  border-radius:10px 10px 0 0; cursor:pointer;
  transition:all .15s ease; margin-bottom:-1px; flex-shrink:0;
}
.detail-tab-btn:hover{ background:var(--bg-soft); color:var(--ink-2); }
.detail-tab-btn.is-active{
  background:var(--accent-soft); color:var(--accent); font-weight:600;
  box-shadow:inset 0 -2px 0 var(--accent);
}

/* ── Intro overlay (shown every visit) ── */
.intro-overlay{
  position:fixed; inset:0; z-index:9600;
  background:rgba(3,27,37,.5); backdrop-filter:blur(6px);
  display:flex; align-items:center; justify-content:center;
  padding:24px; animation:fadeIn .2s ease;
}
.intro-card{
  position:relative; background:var(--bg-card);
  width:100%; max-width:560px; max-height:88vh; overflow-y:auto;
  border-radius:var(--r-lg); border:1px solid var(--rule);

  research: 'СЮДА_ССЫЛКА_НА_CSV_ЛИСТА_ИССЛЕДОВАНИЯ',
};

// Ссылка на развёрнутый Apps Script (заканчивается на /exec) — туда уходит форма «Добавить объект».
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyVTY6SUSuJAYIvDD_PPawLTIz2wzMIqhO0n4oIrXc0LMJIaRiDgMke89TBHm_5Rx_T/exec';
// Общая проверка формата email (name@service.xx) — без привязки к конкретной доменной зоне,
// чтобы не отсекать реальные адреса на .net/.org/.io и корпоративных доменах.
const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/i;
window.DV_EMAIL_RE = EMAIL_RE;

// Достаёт ID файла из любой ссылки на Google Диск: /file/d/ID/view, open?id=ID, uc?id=ID или просто голый ID.
function extractDriveId(url) {
  if (!url) return null;
  const s = String(url).trim();
  let m = s.match(/\/d\/([a-zA-Z0-9_-]{10,})/);
  if (m) return m[1];
  m = s.match(/[?&]id=([a-zA-Z0-9_-]{10,})/);
  if (m) return m[1];
  if (/^[a-zA-Z0-9_-]{10,}$/.test(s)) return s;
  return null;
}
function driveImageUrl(url, size) {
  const id = extractDriveId(url);
  return id ? `https://drive.google.com/thumbnail?id=${id}&sz=${size || 'w1600'}` : null;
}

function fetchSheetRows(url) {
  return new Promise((resolve, reject) => {
    if (!url || url.indexOf('СЮДА_') === 0) { resolve([]); return; }
    Papa.parse(url, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: (res) => resolve(res.data || []),
      error: (err) => reject(err),
    });
  });
}

function parseNumber(v) {
  if (v === undefined || v === null || v === '') return null;
  const n = parseFloat(String(v).replace(',', '.').replace(/\s/g, ''));
  return isNaN(n) ? null : n;
}

async function loadCatalogData() {
  const [objRows, finRows] = await Promise.all([
    fetchSheetRows(SHEET_CSV_URLS.objects),
    fetchSheetRows(SHEET_CSV_URLS.finance),
  ]);

  // Группируем строки листа «Финансы» по ID объекта — один объект может иметь много строк (по году).
  const financeByObject = {};
  finRows.forEach(row => {
    const id = (row['IDОбъекта'] || '').trim();
    const year = parseNumber(row['Год']);
    const v = parseNumber(row['Выручка']);
    if (!id || year === null || v === null) return;
    (financeByObject[id] = financeByObject[id] || []).push({ year, v });
  });
  Object.values(financeByObject).forEach(arr => arr.sort((a, b) => a.year - b.year));

  const objects = objRows
    .filter(row => (row['ID'] || '').trim() && (row['Название'] || '').trim())
    .map(row => {
      const id = row['ID'].trim();
      // Любая колонка с названием, начинающимся на «Фото» (Фото1, Фото2, …) — отдельная ссылка на Google Диск.
      // Можно добавлять сколько угодно таких колонок в таблице — код подхватит их сам, без правок кода.
      const photos = Object.keys(row)
        .filter(k => /^Фото/i.test(k.trim()) && row[k] && row[k].trim())
        .map(k => driveImageUrl(row[k].trim()))
        .filter(Boolean);

      // «Тип» может содержать до 3 типов через запятую (например: «rest, bar») — первый считается главным
      // и используется для иконки/фильтров по группам, остальные — просто доп. теги на карточке.
      const types = (row['Тип'] || '').split(',').map(s => s.trim()).filter(Boolean).slice(0, 3);

      return {
        id,
        name: (row['Название'] || '').trim(),
        type: types[0] || '',
        types,
        city: (row['Город'] || '').trim(),
        addr: (row['Адрес'] || '').trim(),
        region: (row['КодРегиона'] || '').trim(),
        regionName: (row['Область'] || '').trim(),
        built: (row['Датировка'] || '').trim(),
        period: (row['Период'] || '').trim(),
        status: (row['ОхранныйСтатус'] || '').trim() || 'none',
        lat: parseNumber(row['Широта']),
        lng: parseNumber(row['Долгота']),
        group: (row['ГруппаКомпаний'] || '').trim() || '—',
        url: (row['Сайт'] || '').trim(),
        description: (row['Описание'] || '').trim(),
        historyNote: (row['ИсторическаяСправка'] || '').trim(),
        photos,
        photoSource: (row['ИсточникФото'] || '').trim(),
        financeHistory: financeByObject[id] || [],
        lastModified: (row['ПоследнееИзменение'] || '').trim(),
        editedBy: (row['КтоИзменил'] || '').trim(),
      };
    });

  window.DV_DATA.objects = objects;
  window.DV_DATA.finance = financeByObject;
  window.DV_DATA.regions = buildRegionsFromObjects(objects);
  return objects;
}

// Список регионов для фильтра-дерева слева строится из самих объектов, а не хранится отдельно —
// появится новый регион или город в таблице «Объекты», и здесь он подхватится сам по себе,
// без единой правки кода.
function buildRegionsFromObjects(objects) {
  const byId = {};
  objects.forEach(o => {
    if (!o.region) return;
    if (!byId[o.region]) byId[o.region] = { id: o.region, name: o.regionName || o.region, citySet: new Set() };
    if (!byId[o.region].name && o.regionName) byId[o.region].name = o.regionName;
    if (o.city) byId[o.region].citySet.add(o.city);
  });
  return Object.values(byId)
    .map(r => ({ id: r.id, name: r.name, cities: Array.from(r.citySet).sort((a, b) => a.localeCompare(b, 'ru')) }))
    .sort((a, b) => a.name.localeCompare(b.name, 'ru'));
}

// Запускаем загрузку сразу при разборе страницы, не дожидаясь рендера React —
// App() в конце файла дожидается этого промиса и показывает загрузочный экран, пока данных нет.
window._catalogReady = loadCatalogData().catch(err => {
  console.error('Не удалось загрузить каталог из Google Таблицы:', err);
  window._catalogLoadError = err;
  return [];
});

// ============================================
// «СОХРАНЁННОЕ» — для обычных посетителей, без логина и личного кабинета
// Просто список id объектов в localStorage этого браузера.
// ============================================
const SAVED_KEY = 'dv_saved_objects';

window._getSavedIds = () => {
  try { return JSON.parse(localStorage.getItem(SAVED_KEY) || '[]'); }
  catch (e) { return []; }
};
window._isSaved = (id) => window._getSavedIds().includes(id);
window._toggleSaved = (id) => {
  const ids = window._getSavedIds();
  const i = ids.indexOf(id);
  if (i === -1) ids.push(id); else ids.splice(i, 1);
  localStorage.setItem(SAVED_KEY, JSON.stringify(ids));
  window.dispatchEvent(new Event('dv:saved-changed')); // чтобы счётчик и список обновились в других местах страницы
  return ids;
};

}

function RegionPicker({ filters, setFilters }) {
  const R = window.DV_DATA.regions;
  const [open, setOpen] = useState(false);
  const selected = filters.regions || [];
  const label =
  filters.cities.length === 1 ? filters.cities[0] :
  selected.length === 0 ? 'Все регионы' :
  selected.length === 1 ? (R.find((r) => r.id === selected[0]) || {}).name || 'Регион' :
  `Регионы · ${selected.length}`;

  const pickAll = () => {
    setFilters((f) => ({ ...f, regions: [], cities: [] }));
  };
  const toggleRegion = (id) => {
    setFilters((f) => {
      const cur = f.regions || [];
      const next = cur.includes(id) ? cur.filter((x) => x !== id) : [...cur, id];
      return { ...f, regions: next, cities: [] };
    });
  };
  const pickCity = (city) => {
    setFilters((f) => ({ ...f, cities: f.cities[0] === city ? [] : [city] }));
  };

  return (
    <div style={{ position: 'relative' }}>
      <button type="button" className="loc-btn" onClick={() => setOpen((o) => !o)}>
        <I name="pin" className="ic-sm" />
        <span className="loc-btn-label">{label}</span>
        <I name="chevron-down" className="ic-sm" />
      </button>
      {open &&
      <div className="loc-pop" onMouseLeave={() => setOpen(false)}>
          <div className="loc-pop-head">Регион · можно выбрать несколько</div>
          <div className="loc-pop-list scroll-y">
            <button type="button" className={`loc-region${selected.length === 0 ? ' is-active' : ''}`} onClick={pickAll}>
              <span>Все регионы</span>
              {selected.length === 0 && <I name="check" className="ic-sm" />}
            </button>
            {R.map((r) => {
            const isActive = selected.includes(r.id);
            return (
              <div key={r.id}>
                  <button type="button" className={`loc-region${isActive ? ' is-active' : ''}`} onClick={() => toggleRegion(r.id)}>
                    <span>{r.name}</span>
                    {isActive && <I name="check" className="ic-sm" />}
                  </button>
                  {isActive && selected.length === 1 && r.cities.length > 1 &&
                <div className="loc-cities">
                      {r.cities.map((c) =>
                  <button key={c} type="button" className={`loc-city${filters.cities[0] === c ? ' is-active' : ''}`} onClick={() => pickCity(c)}>
                          {c}
                        </button>
                  )}
                    </div>
                }
                </div>);

          })}
          </div>
        </div>
      }
    </div>);

}

/* ── Map (Leaflet) ──────────────────────── */
function MapPane({ objects, hoverId, setHoverId, onOpen, onBoundsChange }) {
  const ref = useRef(null);
  const mapRef = useRef(null);
  const markersRef = useRef({});

  useEffect(() => {
    if (mapRef.current) return;
    const map = L.map(ref.current, {
      center: [59, 50],
      zoom: 3,
      zoomControl: false,
      attributionControl: true,
      minZoom: 3,
      worldCopyJump: true
    });
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    // Remove the default Leaflet attribution prefix (which includes a flag) — keep plain credit
    if (map.attributionControl) map.attributionControl.setPrefix('Leaflet');
    // CartoDB Positron — neutral, editorial-friendly
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap, © CartoDB',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
      attribution: '',
      subdomains: 'abcd',
      maxZoom: 19,
      pane: 'overlayPane'
    }).addTo(map);
    mapRef.current = map;
    // Store reference on DOM element for external invalidateSize
    ref.current._leaflet_map = map;
    // Ensure correct sizing once laid out (flat full-width map)
    setTimeout(() => map.invalidateSize(), 60);

    // Map bounds change tracking
    if (onBoundsChange) {
      const emitBounds = () => onBoundsChange(map.getBounds());
      map.on('moveend', emitBounds);
      map.on('zoomend', emitBounds);
    }
  }, []);

  // Sync markers with filtered list
  useEffect(() => {
    const map = mapRef.current;
    if (!map) return;
    // Объекты без координат (например, пока не геокодированный адрес) на карту не ставим —
    // они всё равно видны в списке/каталоге, просто без точки на карте.
    const geocoded = objects.filter((o) => o.lat != null && o.lng != null && !isNaN(o.lat) && !isNaN(o.lng));
    // remove markers not in list
    const ids = new Set(geocoded.map((o) => o.id));
    Object.entries(markersRef.current).forEach(([id, m]) => {
      if (!ids.has(id)) {map.removeLayer(m);delete markersRef.current[id];}
    });
    // add new
    geocoded.forEach((o) => {
      if (markersRef.current[o.id]) return;
      const iconName = TYPE_ICONS[o.type] || 'columns';
      const html = `<div class="dv-marker" data-id="${o.id}">
        <svg viewBox="0 0 840 840" fill="currentColor" stroke="none" width="20" height="20">
          ${iconSvgPath(iconName)}
        </svg>
      </div>`;
      const icon = L.divIcon({ html, className: 'dv-icon', iconSize: [32, 32], iconAnchor: [16, 16] });
      const m = L.marker([o.lat, o.lng], { icon }).addTo(map);
      m.bindPopup(popupHtml(o), { closeButton: false, offset: [0, -10] });
      m.on('mouseover', () => {setHoverId(o.id);m.openPopup();});
      m.on('mouseout', () => {setHoverId(null);});
      m.on('click', () => onOpen(o));
      // clicking the popup bubble itself also opens the detail card
      m.on('popupopen', (e) => {
        const node = e.popup.getElement();
        if (!node) return;
        node.style.cursor = 'pointer';
        node.addEventListener('click', () => onOpen(o));
      });
      markersRef.current[o.id] = m;
    });
    // Zoom tightly to whatever objects are currently shown (the active filter group)
    if (geocoded.length > 0) {
      const b = L.latLngBounds(geocoded.map((o) => [o.lat, o.lng]));
      const fit = () => {
        map.invalidateSize();
        map.fitBounds(b, {
          padding: [48, 48],
          maxZoom: geocoded.length === 1 ? 14 : 13,
          animate: true
        });
      };
      // run after layout so the bounds are computed against the real map size
      setTimeout(fit, 80);
    }
  }, [objects]);

  // Highlight on hover
  useEffect(() => {
    Object.entries(markersRef.current).forEach(([id, m]) => {
      const el = m.getElement()?.querySelector('.dv-marker');
      if (el) el.classList.toggle('is-active', id === hoverId);
    });
    if (hoverId && markersRef.current[hoverId]) {
      markersRef.current[hoverId].openPopup();
    }
  }, [hoverId]);

  return <div ref={ref} style={{ width: '100%', height: '100%' }} />;
}

/* ── Catalog page ───────────────────────── */
function Catalog({ onOpen, viewMode, setViewMode }) {
  const D = window.DV_DATA;
  const [filters, setFilters] = useState({
    groups: [], regions: [], cities: [], periods: [], statuses: []
  });
  const [hoverId, setHoverId] = useState(null);
  const PAGE = 12;
  const [shown, setShown] = useState(PAGE);
  const mapSectionRef = useRef(null);
  const [pastMap, setPastMap] = useState(false);

  const filtered = useMemo(() => {
    let xs = D.objects.slice();
    if (filters.groups.length) {
      const allowed = new Set(filters.groups.flatMap((g) => D.groups[g].types));
      xs = xs.filter((o) => (o.types && o.types.length ? o.types : [o.type]).some((t) => allowed.has(t)));
    }
    if (filters.cities.length) xs = xs.filter((o) => filters.cities.includes(o.city));
    else if (filters.regions && filters.regions.length) xs = xs.filter((o) => filters.regions.includes(o.region));
    if (filters.periods.length) xs = xs.filter((o) => filters.periods.includes(o.period));
    if (filters.statuses.length) xs = xs.filter((o) => filters.statuses.includes(o.status));
    return xs;
  }, [filters]);

  // reset pagination when the result set changes
  useEffect(() => { setShown(PAGE); }, [filtered.length, filters]);

  // track scroll position to switch the floating hint between "jump to map" and "back to top"
  useEffect(() => {
    const onScroll = () => {
      const el = mapSectionRef.current;
      if (!el) return;
      const top = el.getBoundingClientRect().top;
      setPastMap(top <= window.innerHeight * 0.4);
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, [filtered.length]);

  const visible = filtered.slice(0, shown);

  const jumpToMap = () => {
    mapSectionRef.current && mapSectionRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };
  const jumpToTop = () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  return (
    <div>
      <FilterBar filters={filters} setFilters={setFilters} count={filtered.length} />

      {/* Cards */}
      <div className="catalog-grid-wrap">
        <div className="eyebrow catalog-count">
        </div>
        {filtered.length === 0 ?
        <div style={{ textAlign: 'center', padding: '64px 12px', color: 'var(--ink-3)', fontFamily: 'var(--f-serif)', fontSize: 17 }}>
            По заданным фильтрам объектов не найдено
          </div> :

        <>
            <div className="estate-grid">
              {visible.map((o, i) =>
            <ObjectCard key={`${o.id}-${i}`} obj={o} onOpen={onOpen}
            highlighted={hoverId === o.id} onHover={setHoverId} />
            )}
            </div>
            {shown < filtered.length &&
          <div style={{ display: 'flex', justifyContent: 'center', marginTop: 36 }}>
                <button className="btn btn-ghost btn-lg load-more-btn" onClick={() => setShown((s) => s + PAGE)}>
                  Загрузить ещё
                </button>
              </div>
          }
          </>
        }
      </div>

      {/* Flat map below */}
      <div className="catalog-map-section" ref={mapSectionRef}>
        <div className="catalog-map-head">
        </div>
        <div className="catalog-map-frame">
          <MapPane objects={filtered} hoverId={hoverId} setHoverId={setHoverId} onOpen={onOpen} />
        </div>
      </div>

      {/* Desktop-only hint: jump to the map below, or back up once you're there */}
      <button
        type="button"
        className="desktop-map-jump-btn"
        onClick={pastMap ? jumpToTop : jumpToMap}>
        <I name={pastMap ? 'arrow-up' : 'chevron-down'} className="ic-sm" />
        {pastMap ? 'Наверх' : 'Карта объектов'}
      </button>
    </div>);

}

function revNum(r) {if (!r || r === '—') return 0;const m = r.match(/([\d.]+)\s*(млн|млрд)/);if (!m) return 0;return parseFloat(m[1]) * (m[2] === 'млрд' ? 1000 : 1);}

/* ── «Сохранённое» — для всех посетителей, без логина и личного кабинета ──
   Список id хранится в localStorage этого браузера (см. window._getSavedIds). */
function SavedTab({ onOpen }) {
  const [ids, setIds] = useState(() => window._getSavedIds());

  useEffect(() => {
    const onChange = () => setIds(window._getSavedIds());
    window.addEventListener('dv:saved-changed', onChange);
    return () => window.removeEventListener('dv:saved-changed', onChange);
  }, []);

  const savedObjects = window.DV_DATA.objects.filter(o => ids.includes(o.id));

  return (
    <div className="catalog-grid-wrap" style={{ paddingBottom: 88 }}>
      <div className="eyebrow catalog-count" style={{marginBottom:22}}>
        Сохранено · {savedObjects.length}
      </div>
      {savedObjects.length === 0 ?
      <div style={{ textAlign:'center', padding:'64px 12px', color:'var(--ink-3)', fontFamily:'var(--f-serif)', fontSize:17 }}>
        Пока ничего не сохранено — нажмите на сердечко у объекта, чтобы он появился здесь.
      </div> :
      <div className="estate-grid">
        {savedObjects.map((o, i) =>
        <ObjectCard key={`${o.id}-${i}`} obj={o} onOpen={onOpen}/>
        )}
      </div>}
    </div>
  );
}

/* ── «Исследования» — карточки картинка+подпись, тянутся из отдельного листа Google Таблицы ──
   Колонки листа: «Подпись», «Картинка» (ссылка на Google Диск), «Ссылка» (PDF на Google Диске). */
function useResearchData() {
  const [items, setItems] = useState(null); // null — ещё грузится

  useEffect(() => {
    fetchSheetRows(SHEET_CSV_URLS.research)
    .then((rows) => {
      const parsed = rows.
      filter((r) => (r['Подпись'] || '').trim()).
      map((r) => ({
        caption: (r['Подпись'] || '').trim(),
        image: driveImageUrl((r['Картинка'] || '').trim()) || (r['Картинка'] || '').trim() || null,
        link: (r['Ссылка'] || '').trim()
      }));
      setItems(parsed);
    }).
    catch(() => setItems([]));
  }, []);

  return items;
}

        </div> :

function formatDateTime(iso){
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  const date = d.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric' });
  const time = d.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' });
  return `${date}, ${time}`;
}

function labelForPeriod(id){
  const p = window.DV_DATA.periods.find(x=>x.id===id);
  return p ? p.label : '';
}

/* ── Lightbox: fullscreen photo viewer with prev/next ── */
function PhotoLightbox({ labels, srcs, index, onClose, onIndexChange }) {
  const total = labels.length;
  const currentSrc = srcs && srcs[index];
  const [imgFailed, setImgFailed] = useState(false);
  const goPrev = () => { setImgFailed(false); onIndexChange((index - 1 + total) % total); };
  const goNext = () => { setImgFailed(false); onIndexChange((index + 1) % total); };

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowLeft') goPrev();
      if (e.key === 'ArrowRight') goNext();
    };
    window.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => {
      window.removeEventListener('keydown', onKey);
      document.body.style.overflow = '';
    };
  }, [index, total]);

  return (
    <div className="lightbox-overlay" onClick={onClose}>
      <button className="lightbox-close" onClick={onClose} aria-label="Закрыть">
        <I name="close" className="ic-sm"/>
      </button>

      {total > 1 &&
      <button className="lightbox-nav lightbox-nav--prev" onClick={(e)=>{e.stopPropagation();goPrev();}} aria-label="Предыдущее фото">
        <I name="chevron-left" className="ic-lg"/>
      </button>}

      <figure className="lightbox-figure" onClick={(e)=>e.stopPropagation()}>
        {(!currentSrc || imgFailed) ?
        <div className="lightbox-fallback"><I name="camera" className="ic-lg"/><span>Фото скоро появится</span></div> :
        <img src={currentSrc} alt={labels[index]} className="lightbox-img" onError={()=>setImgFailed(true)}/>}
        <figcaption className="lightbox-caption">
          {total > 1 && <span className="lightbox-counter">{index + 1} / {total}</span>}
        </figcaption>
      </figure>

      {total > 1 &&
      <button className="lightbox-nav lightbox-nav--next" onClick={(e)=>{e.stopPropagation();goNext();}} aria-label="Следующее фото">
        <I name="chevron-right" className="ic-lg"/>
      </button>}
    </div>);

}

/* ── Modal wrapper ──────────────────────── */
function DetailModal({ obj, onClose }) {

  <script type="text/babel">
/* ============================================
   Add Object — multi-step wizard
   ============================================ */
/* eslint-disable */

function AddObjectForm({ onClose }) {
  const [step, setStep] = useState(1);
  const [data, setData] = useState({
    name: '', types: [], addr: '', desc: '',
    period: '', status: '', history: '', photos: [],
    site: '', phone: '', email: '', revenue: '', consent: false,
  });
  const [errors, setErrors] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [submitError, setSubmitError] = useState('');
  const [submissionId, setSubmissionId] = useState(null);

  const set = (k, v) => setData(d => ({...d, [k]: v}));

  const validate = (s) => {
    const e = {};
    if (s === 1) {
      if (!data.name)  e.name = 'Укажите название';
      if (!data.types.length) e.types = 'Выберите хотя бы один тип';
      if (!data.addr)  e.addr = 'Укажите адрес';
      if (!data.desc)  e.desc = 'Добавьте описание';
    }
    if (s === 2) {
      if (!data.period) e.period = 'Выберите период';
      if (!data.status) e.status = 'Выберите статус';
    }
    if (s === 3) {
      if (!data.email)   e.email = 'Укажите email';
      else if (!EMAIL_RE.test(data.email.trim())) e.email = 'Проверьте формат email (например, name@service.ru)';
      if (!data.consent) e.consent = 'Нужно согласие';
    }
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const next = () => { if (validate(step)) setStep(s=>s+1); };
  const prev = () => setStep(s => Math.max(1, s-1));

  // Превращает выбранный файл в base64 (без префикса data:...;base64,) для отправки в Apps Script
  const fileToBase64 = (file) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result).split(',')[1] || '');
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });

  const submit = async () => {
    if (!validate(3)) return;
    setSubmitting(true);
    setSubmitError('');
    try {
      const photosPayload = await Promise.all(
        data.photos.map(async (p) => ({
          filename: p.file.name,
          mimeType: p.file.type || 'image/jpeg',
          base64: await fileToBase64(p.file),
        }))
      );

      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        // text/plain — чтобы браузер не слал предварительный CORS-запрос (OPTIONS),
        // который Apps Script Web App не обрабатывает; тело всё равно обычный JSON.
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          action: 'submitObject',
          name: data.name,
          // До 3 типов — сохраняются в ту же колонку «Тип» через запятую, первый считается главным.
          type: data.types.join(', '),
          address: data.addr,
          desc: data.desc,
          period: data.period,
          status: data.status,
          history: data.history,
          site: data.site,
          phone: data.phone,
          email: data.email,
          revenue: data.revenue,
          photos: photosPayload,
        }),
      });
      const json = await res.json();
      if (!json.ok) throw new Error(json.error || 'Не удалось отправить заявку');
      setSubmissionId(json.submissionId);
      setSubmitted(true);
    } catch (err) {
      setSubmitError('Не получилось отправить заявку. Проверьте интернет-соединение и попробуйте ещё раз. (' + err.message + ')');
    } finally {
      setSubmitting(false);
    }
  };

  if (submitted) return <SuccessScreen onClose={onClose} submissionId={submissionId}/>;

  return (
    <div style={{maxWidth:680, margin:'0 auto', padding:'40px 24px 80px'}}>
      <header style={{marginBottom:32}}>
        <div className="eyebrow">Добавить объект в реестр</div>
        <h1 className="h-title" style={{margin:'8px 0 0', fontSize:36}}>
          Расскажите о вашем бизнесе в&nbsp;историческом здании
        </h1>
      </header>

      {/* Progress */}
      <div style={{display:'flex', alignItems:'center', gap:0, marginBottom:40}}>
        {[1,2,3].map((s, i) => (
          <React.Fragment key={s}>
            <div style={{
              display:'flex', alignItems:'center', gap:10,
              opacity: s <= step ? 1 : .4,
            }}>
              <div style={{
                width:32, height:32, borderRadius:'50%',
                border:`1.5px solid ${s < step ? 'var(--accent)' : s === step ? 'var(--ink)' : 'var(--rule-strong)'}`,
                background: s < step ? 'var(--accent)' : 'transparent',
                color: s < step ? '#fff' : (s===step ? 'var(--ink)' : 'var(--ink-3)'),
                display:'flex', alignItems:'center', justifyContent:'center',
                fontFamily:'var(--f-mono)', fontSize:13,
                transition:'all .2s',
              }}>
                {s < step ? <I name="check" className="ic-sm"/> : s}
              </div>
              <div>
                <div className="mono" style={{fontSize:10, color:'var(--ink-3)', letterSpacing:'.14em'}}>ШАГ {s}</div>
                <div style={{fontSize:13, fontWeight: s===step?500:300}}>
                  {['Основное','Здание','Контакты'][i]}
                </div>
              </div>
            </div>
            {i < 2 && (
              <div style={{
                flex:1, height:1,
                background: s < step ? 'var(--accent)' : 'var(--rule-strong)',
                margin:'0 16px',
                transition:'background .2s',
              }}/>
            )}
          </React.Fragment>
        ))}
      </div>

      <div key={step} style={{animation:'slideUp .25s ease'}}>
        {step === 1 && <Step1 data={data} set={set} errors={errors}/>}
        {step === 2 && <Step2 data={data} set={set} errors={errors}/>}
        {step === 3 && <Step3 data={data} set={set} errors={errors}/>}
      </div>

      {submitError &&
      <div style={{marginTop:24, padding:'12px 16px', borderRadius:'var(--r)', background:'var(--st-rej-bg)', color:'var(--st-rej)', fontSize:13}}>
        {submitError}
      </div>}

      <div style={{display:'flex', justifyContent:'space-between', marginTop:40, paddingTop:24, borderTop:'1px solid var(--rule)'}}>
        <button className="btn btn-ghost" onClick={step === 1 ? onClose : prev} disabled={submitting}>
          <I name="chevron-left" className="ic-sm"/>
          {step === 1 ? 'Отмена' : 'Назад'}
        </button>
        {step < 3 ? (
          <button className="btn btn-primary" onClick={next}>
            Далее<I name="chevron-right" className="ic-sm"/>
          </button>
        ) : (
          <button className="btn btn-primary" onClick={submit} disabled={submitting}>
            <I name="send" className="ic-sm"/>{submitting ? 'Отправляем…' : 'Отправить заявку'}
          </button>
        )}
      </div>
    </div>
  );
}

function FormField({ label, error, hint, required, children }) {
  return (
    <div className="field" style={{marginBottom:24}}>
      <label>
        {label}{required && <span style={{color:'var(--accent)', marginLeft:4}}>*</span>}
      </label>
      {children}
      {hint && !error && <span style={{fontSize:12, color:'var(--ink-3)'}}>{hint}</span>}
      {error && <span style={{fontSize:12, color:'var(--st-rej)'}}>{error}</span>}
    </div>
  );
}

function Step1({ data, set, errors }) {
  return (
    <div>
      <SectionHeader eyebrow="01" title="Основная информация" icon="building"/>
      <div style={{marginTop:28}}>
        <FormField label="Название бизнеса" required error={errors.name}>
          <input className="input" placeholder="Например, Кафе на Покровке"
            value={data.name} onChange={e=>set('name', e.target.value)}/>
        </FormField>

        <FormField label="Тип бизнеса" required error={errors.types}
          hint={`Можно выбрать до 3 типов, первый выбранный — главный · ${data.types.length}/3`}>
          <div style={{display:'flex', gap:8, flexWrap:'wrap', marginTop:8}}>
            {Object.entries(window.DV_DATA.types).map(([k, v]) => {
              const idx = data.types.indexOf(k);
              const active = idx !== -1;
              const disabled = !active && data.types.length >= 3;
              const toggleType = () => {
                if (disabled) return;
                set('types', active ? data.types.filter(x => x !== k) : [...data.types, k]);
              };
              return (
                <button key={k} type="button" disabled={disabled}
                  onClick={toggleType}
                  style={{
                    display:'inline-flex', alignItems:'center', gap:6,
                    height:34, padding:'0 14px 0 2px', borderRadius:999,
                    border:`1px solid ${active ? 'var(--ink)' : 'var(--rule-strong)'}`,
                    background: active ? 'var(--ink)' : 'transparent',
                    color: active ? '#fff' : (disabled ? 'var(--ink-3)' : 'var(--ink)'),
                    fontSize:13, cursor: disabled ? 'not-allowed' : 'pointer', transition:'all .15s',
                    opacity: disabled ? .5 : 1,
                  }}>
                  <I name={TYPE_ICONS[k]} className="ic-sm"/>{v.label}
                  {active && <span className="mono" style={{fontSize:11, opacity:.7}}>№{idx + 1}</span>}
                </button>
              );
            })}
          </div>
        </FormField>

        <FormField label="Адрес" required error={errors.addr}>
          <input className="input" placeholder="Город, улица, дом"
            value={data.addr} onChange={e=>set('addr', e.target.value)}/>
        </FormField>

        <FormField label="Описание" required error={errors.desc} hint={`${data.desc.length}/500`}>
          <textarea className="textarea" rows={4} maxLength={500}
            placeholder="Расскажите о бизнесе и здании в нескольких предложениях"
            value={data.desc} onChange={e=>set('desc', e.target.value.slice(0, 500))}/>
        </FormField>
      </div>
    </div>
  );
}

function Step2({ data, set, errors }) {
  const fileInputRef = useRef(null);
  const MAX_PHOTOS = 10;
  const MAX_SIZE_MB = 10;

  const handleFiles = (fileList) => {
    const incoming = Array.from(fileList || [])
      .filter(f => f.type.startsWith('image/'))
      .filter(f => f.size <= MAX_SIZE_MB * 1024 * 1024)
      .slice(0, Math.max(0, MAX_PHOTOS - data.photos.length))
      .map(file => ({ file, previewUrl: URL.createObjectURL(file) }));
    if (incoming.length) set('photos', [...data.photos, ...incoming]);
  };

  const removePhoto = (i) => {
    URL.revokeObjectURL(data.photos[i].previewUrl);
    set('photos', data.photos.filter((_, j) => j !== i));
  };

  return (
    <div>
      <SectionHeader eyebrow="02" title="Об историческом здании" icon="building"/>
      <div style={{marginTop:28}}>
        <FormField label="Период / год постройки" required error={errors.period}>
          <div style={{display:'flex', gap:8, flexWrap:'wrap', marginTop:8}}>
            {window.DV_DATA.periods.map(p => (
              <button key={p.id} type="button"
                onClick={()=>set('period', p.id)}
                style={{
                  height:34, padding:'0 14px', borderRadius:999,
                  border:`1px solid ${data.period===p.id ? 'var(--ink)' : 'var(--rule-strong)'}`,
                  background: data.period===p.id ? 'var(--ink)' : 'transparent',
                  color: data.period===p.id ? '#fff' : 'var(--ink)',
                  fontSize:13, cursor:'pointer',
                }}>{p.label}</button>
            ))}
          </div>
        </FormField>

        <FormField label="Юридический статус" required error={errors.status}>
          <div className="step2-status-grid" style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:10, marginTop:8}}>
            {[
              ['okn', 'ОКН', 'Объект культурного наследия'],
              ['icgfo', 'ИЦГФО', 'Истор. ценный градоформирующий'],
              ['none', 'Без статуса', 'Историческое здание без охраны'],
              ['unknown', 'Не знаю', 'Уточним при модерации'],
            ].map(([k, l, sub]) => (
              <button key={k} type="button"
                onClick={()=>set('status', k)}
                style={{
                  padding:'12px 14px', textAlign:'left',
                  borderRadius:'var(--r)',
                  border:`1px solid ${data.status===k ? 'var(--ink)' : 'var(--rule-strong)'}`,
                  background: data.status===k ? '#fff' : 'transparent',
                  cursor:'pointer', display:'flex', flexDirection:'column', gap:4,
                  transition:'all .15s',
                }}>
                <span style={{fontWeight:500, fontSize:14}}>{l}</span>
                <span style={{fontSize:11, color:'var(--ink-3)'}}>{sub}</span>
              </button>
            ))}
          </div>
        </FormField>

        <FormField label="Историческая справка" hint={`Опционально — что вы знаете о здании, архитекторе, событиях · ${data.history.length}/4000`}>
          <textarea className="textarea" rows={3} maxLength={4000}
            placeholder="Например, здание построено в 1903 году архитектором..."
            value={data.history} onChange={e=>set('history', e.target.value.slice(0, 4000))}/>
        </FormField>

        <FormField label="Фотографии" hint={data.photos.length >= MAX_PHOTOS ? `Максимум ${MAX_PHOTOS} фото` : null}>
          <input
            ref={fileInputRef}
            type="file"
            accept="image/*"
            multiple
            style={{display:'none'}}
            onChange={e => { handleFiles(e.target.files); e.target.value = ''; }}
          />
          {data.photos.length < MAX_PHOTOS &&
          <div
            onClick={() => fileInputRef.current && fileInputRef.current.click()}
            onDragOver={e => e.preventDefault()}
            onDrop={e => { e.preventDefault(); handleFiles(e.dataTransfer.files); }}
            style={{
              marginTop:8,
              border:'1.5px dashed var(--rule-strong)',
              borderRadius:'var(--r)',
              padding:'24px',
              display:'flex', flexDirection:'column', alignItems:'center', gap:8,
              cursor:'pointer', background:'var(--bg-soft)',
              transition:'all .15s',
            }}
            onMouseEnter={e=>e.currentTarget.style.borderColor='var(--accent)'}
            onMouseLeave={e=>e.currentTarget.style.borderColor='var(--rule-strong)'}
          >
            <div style={{width:48, height:48, borderRadius:'50%', background:'#fff', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--ink-2)'}}>
              <I name="camera" className="ic-lg"/>
            </div>
            <div style={{fontSize:14, color:'var(--ink-2)'}}>Перетащите файлы сюда или нажмите для выбора</div>

          {data.photos.length > 0 && (
            <div style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:10, marginTop:12}}>
              {data.photos.map((p, i) => (
                <div key={i} style={{aspectRatio:'1', position:'relative'}}>
                  <Photo obj={{id:`up${i}`, type:data.types[0]}} src={p.previewUrl} ratio="1"/>

                    style={{
                      position:'absolute', top:6, right:6,
                      width:24, height:24, borderRadius:'50%',
                      background:'rgba(255,255,255,.9)',
                      border:'none', cursor:'pointer',
                      display:'flex', alignItems:'center', justifyContent:'center',
                    }}>
                    <I name="close" className="ic-sm"/>
                  </button>
                </div>
              ))}
            </div>
          )}
        </FormField>
      </div>
    </div>
  );
}

            Я согласен на публикацию указанных данных в реестре «Дом вдали» и подтверждаю обработку персональных данных согласно политике конфиденциальности.
          </span>
        </label>
        {errors.consent && <div style={{fontSize:12, color:'var(--st-rej)', marginTop:6}}>{errors.consent}</div>}
      </div>
    </div>
  );
}

  <script type="text/babel">
/* ============================================
   App shell — header, routing, mobile detect

/* eslint-disable */
const { useState, useEffect, useMemo, useRef, useCallback } = React;
const { FilterChip, RegionPicker, MoreFilters } = window;

function Header({ route, setRoute, onAdd, mobileMenuOpen, setMobileMenuOpen }) {

}

}

/* ============================================
   Mobile catalog (separate component)
   ============================================ */
function MobileCatalog({ onOpen }) {
  const D = window.DV_DATA;
  const [view, setView] = useState('map');
  const [filtersOpen, setFiltersOpen] = useState(false);
  const [filters, setFilters] = useState({
    groups: [], regions: [], cities: [], periods: [], statuses: []
  });
  const mapContainerRef = useRef(null);

  const filtered = useMemo(() => {
    let xs = D.objects.slice();
    if (filters.groups.length) {
      const allowed = new Set(filters.groups.flatMap((g) => D.groups[g].types));
      xs = xs.filter((o) => (o.types && o.types.length ? o.types : [o.type]).some((t) => allowed.has(t)));
    }
    if (filters.cities.length) xs = xs.filter((o) => filters.cities.includes(o.city));
    else if (filters.regions && filters.regions.length) xs = xs.filter((o) => filters.regions.includes(o.region));
    if (filters.periods.length) xs = xs.filter((o) => filters.periods.includes(o.period));
    if (filters.statuses.length) xs = xs.filter((o) => filters.statuses.includes(o.status));
    return xs;
  }, [filters]);

  // invalidateSize when switching to map
  useEffect(() => {
    if (view === 'map' && mapContainerRef.current) {
      const mapEl = mapContainerRef.current.querySelector('.leaflet-container');
      if (mapEl && mapEl._leaflet_id) {
        // find map instance
        setTimeout(() => {
          const containers = mapContainerRef.current.querySelectorAll('.leaflet-container');
          containers.forEach(c => {
            if (c._leaflet_map) c._leaflet_map.invalidateSize();
          });
        }, 100);
      }
    }
  }, [view]);

  const activeCount = filters.groups.length + (filters.cities.length ? 1 : 0) + filters.periods.length + filters.statuses.length;
  const G = D.groups;
  const toggle = (key, val) => {
    setFilters((f) => {
      const arr = f[key];
      return { ...f, [key]: arr.includes(val) ? arr.filter((x) => x !== val) : [...arr, val] };
    });
  };

  return (
    <div style={{ position: 'relative', minHeight: 'calc(100dvh - var(--header-h))' }}>
      {/* Mobile filter bar — same controls as desktop, always visible */}
      <div className="mobile-filterbar" style={{
        position: 'sticky', top: 'var(--header-h)', zIndex: 100,
        background: 'rgba(255,255,255,.97)', backdropFilter: 'blur(10px)',
        borderBottom: '1px solid var(--rule)',
        padding: '10px 12px',
        display: 'flex', flexDirection: 'column', gap: 8
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
          {Object.entries(G).map(([k, v]) =>
          <FilterChip key={k} active={filters.groups.includes(k)} onClick={() => toggle('groups', k)}>
              {v.label}
            </FilterChip>
          )}
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <RegionPicker filters={filters} setFilters={setFilters} />
          </div>
          <MoreFilters filters={filters} setFilters={setFilters} />
        </div>
        <span className="mono" style={{ fontSize: 11, color: 'var(--ink-3)', letterSpacing: '.04em' }}>
          {filtered.length} объектов
        </span>
      </div>

      {view === 'list' ?
      <div style={{ padding: '12px 14px', paddingBottom: 'calc(80px + env(safe-area-inset-bottom, 0px))', display: 'flex', flexDirection: 'column', gap: 14 }}>
          {filtered.map((o, i) =>
        <ObjectCard key={`${o.id}-${i}`} obj={o} onOpen={onOpen} />
        )}
          {filtered.length === 0 &&
          <div className="card" style={{ textAlign: 'center', padding: '36px 12px', color: 'var(--ink-3)' }}>
            Объектов не найдено
          </div>
          }
        </div> :

      <div ref={mapContainerRef} className="mobile-map-container" style={{ height: 'calc(100dvh - var(--header-h) - 150px)', minHeight: 360, position: 'relative' }}>
          <MapPane objects={filtered} hoverId={null} setHoverId={() => {}} onOpen={onOpen} />
        </div>
      }

      {/* Bottom floating toggle button */}
      <button className="mobile-bottom-btn" onClick={() => setView(view === 'map' ? 'list' : 'map')}>
        <I name={view === 'map' ? 'list' : 'map'} className="ic-sm" style={{ color: '#fff' }} />
        {view === 'map' ? `Список (${filtered.length})` : 'Карта'}
      </button>
    </div>);

}

function MobileFilters({ filters, setFilters, count, onClose, onReset }) {
  const G = window.DV_DATA.groups;
  const P = window.DV_DATA.periods;
  const S = window.DV_DATA.statuses;
  const R = window.DV_DATA.regions;
  const toggle = (key, val) => {
    setFilters((f) => {
      const arr = f[key];
      return { ...f, [key]: arr.includes(val) ? arr.filter((x) => x !== val) : [...arr, val] };
    });
  };
  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 9000, background: 'rgba(3,27,37,.4)', display: 'flex', alignItems: 'flex-end', animation: 'fadeIn .15s' }} onClick={onClose}>
      <div style={{
        background: '#fff', width: '100%', borderRadius: '16px 16px 0 0',
        maxHeight: '85vh', overflowY: 'auto',
        animation: 'slideUp .2s ease'
      }} className="scroll-y" onClick={(e) => e.stopPropagation()}>
        <div style={{
          padding: '14px 18px 0',
          position: 'sticky', top: 0, background: '#fff', zIndex: 5
        }}>
          <div style={{ width: 38, height: 4, background: 'var(--rule-strong)', borderRadius: 2, margin: '0 auto 12px' }} />
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
            <h2 className="h-title" style={{ margin: 0, fontSize: 22 }}>Фильтры</h2>
          </div>
        </div>

        <div style={{ padding: '18px' }}>
          <FilterGroup title="Категория">
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              {Object.entries(G).map(([k, v]) =>
              <FilterChip key={k} active={filters.groups.includes(k)} onClick={() => toggle('groups', k)}>
                  {v.label}
                </FilterChip>
              )}
            </div>
          </FilterGroup>
          <FilterGroup title="Регион">
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              <FilterChip active={!filters.regions.length} onClick={() => setFilters((f) => ({ ...f, regions: [], cities: [] }))}>
                Все
              </FilterChip>
              {R.map((r) =>
              <FilterChip key={r.id} active={filters.regions.includes(r.id)} onClick={() => setFilters((f) => ({
                ...f,
                regions: f.regions.includes(r.id) ? f.regions.filter((x) => x !== r.id) : [...f.regions, r.id],
                cities: []
              }))}>
                  {r.name}
                </FilterChip>
              )}
            </div>
          </FilterGroup>
          <FilterGroup title="Период постройки">
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              {P.map((p) =>
              <FilterChip key={p.id} active={filters.periods.includes(p.id)} onClick={() => toggle('periods', p.id)}>
                  {p.label}
                </FilterChip>
              )}
            </div>
          </FilterGroup>
          <FilterGroup title="Юридический статус">
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              {Object.entries(S).map(([k, v]) =>
              <FilterChip key={k} active={filters.statuses.includes(k)} onClick={() => toggle('statuses', k)}>
                  {v.label}
                </FilterChip>
              )}
            </div>
          </FilterGroup>
        </div>

        <div style={{
          position: 'sticky', bottom: 0, background: '#fff',
          padding: '14px 18px', paddingBottom: 'calc(14px + env(safe-area-inset-bottom, 0px))', borderTop: '1px solid var(--rule)'
        }}>
          <button className="btn btn-primary btn-lg" onClick={onClose} style={{ width: '100%' }}>
            Показать {count} объектов
          </button>
        </div>
      </div>
    </div>);

}

function FilterGroup({ title, children }) {
  return (
    <div style={{ paddingBottom: 18, marginBottom: 18, borderBottom: '1px solid var(--rule)' }}>
      <h3 className="eyebrow" style={{ marginBottom: 12 }}>{title}</h3>
      {children}
    </div>);

}

/* ── Страница для несуществующего адреса (плохая/устаревшая ссылка) ── */
function NotFoundPage({ onGoCatalog }) {
  return (
    <div style={{ minHeight: 'calc(100vh - var(--header-h) - 260px)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 18, padding: '80px 24px', textAlign: 'center' }}>
      <div className="mono" style={{ fontSize: 12, letterSpacing: '.08em', color: 'var(--ink-3)' }}>404</div>
      <h1 className="h-title" style={{ fontSize: 30, margin: 0 }}>Такой страницы нет</h1>
      <div style={{ fontSize: 15, color: 'var(--ink-2)', maxWidth: 420, lineHeight: 1.5 }}>
        Возможно, ссылка устарела или в адресе опечатка. Загляните в каталог — там точно есть на что посмотреть.
      </div>
      <button className="btn btn-primary" onClick={onGoCatalog}>
        <I name="chevron-left" className="ic-sm" />В каталог
      </button>
    </div>);

}

/* ============================================
   App root
   ============================================ */
function App() {
  const [route, setRoute] = useState(() => {
    const h = location.hash.replace('#', '').split('/')[0];
    if (!h) return 'catalog';
    return ['catalog', 'ds', 'saved', 'research'].includes(h) ? h : 'notfound';
  });
  // Если в адресе уже есть id объекта (пришли по прямой ссылке на карточку) — откроем её,
  // как только каталог подгрузится.
  const [pendingObjId] = useState(() => {
    const parts = location.hash.replace('#', '').split('/');
    return parts[1] || null;
  });
  const [openObj, setOpenObjRaw] = useState(null);
  // Открывая карточку, кладём её id в адресную строку — так ссылку на конкретный объект
  // можно скопировать прямо из строки браузера (взамен убранной кнопки «Поделиться»).
  const setOpenObj = (obj) => {
    setOpenObjRaw(obj);
    location.hash = obj ? `${route}/${obj.id}` : route;
  };
  const [addOpen, setAddOpen] = useState(false);
  const [viewMode, setViewMode] = useState('split');
  const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
  const [isMobile, setIsMobile] = useState(() => window.matchMedia('(max-width: 768px)').matches);
  // No localStorage / cookies here on purpose — the intro is meant to show on every visit
  const [introOpen, setIntroOpen] = useState(true);
  // Каталог теперь грузится из Google Таблицы асинхронно — ждём, пока данные подъедут.
  const [dataReady, setDataReady] = useState(false);
  const [dataError, setDataError] = useState(null);

  useEffect(() => {
    window._catalogReady.then(() => {
      setDataReady(true);
      setDataError(window._catalogLoadError || null);
      if (pendingObjId) {
        const found = (window.DV_DATA.objects || []).find(o => o.id === pendingObjId);
        if (found) setOpenObjRaw(found);
      }
    });
  }, []);

  useEffect(() => {
    const onResize = () => setIsMobile(window.matchMedia('(max-width: 768px)').matches);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  useEffect(() => { if (!openObj) location.hash = route; }, [route]);

  if (!dataReady) {
    return (
      <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:14 }}>
        <div className="mono" style={{ fontSize:12, letterSpacing:'.08em', color:'var(--ink-3)' }}>ДОМ ВДАЛИ</div>
        <div style={{ fontSize:15, color:'var(--ink-2)' }}>Загружаем каталог…</div>
      </div>
    );
  }

  return (
    <div data-screen-label={`Дом вдали · ${route}`}>
      {introOpen && <IntroOverlay onClose={() => setIntroOpen(false)} />}

      {dataError &&
      <div style={{ background:'var(--st-rej-bg)', color:'var(--st-rej)', padding:'10px 20px', fontSize:13, textAlign:'center' }}>
        Не получилось загрузить данные из Google Таблицы. Проверьте, что ссылки на CSV в коде сайта правильные и лист опубликован.
      </div>}

      <Header route={route} setRoute={setRoute}
      onAdd={() => setAddOpen(true)}
      mobileMenuOpen={mobileMenuOpen}
      setMobileMenuOpen={setMobileMenuOpen} />

      <MobileMenu open={mobileMenuOpen} onClose={() => setMobileMenuOpen(false)}
      route={route} setRoute={setRoute} onAdd={() => setAddOpen(true)} />

      {route === 'catalog' && (
      isMobile ?
      <MobileCatalog onOpen={setOpenObj} /> :
      <Catalog onOpen={setOpenObj} viewMode={viewMode} setViewMode={setViewMode} />)
      }
      {route === 'saved' && <SavedTab onOpen={setOpenObj}/>}
      {route === 'research' && <ResearchPage/>}
      {route === 'notfound' && <NotFoundPage onGoCatalog={() => setRoute('catalog')}/>}
      {route === 'ds' && <DesignSystemPage />}

      <SiteFooter/>

      {openObj && <DetailModal obj={openObj} onClose={() => setOpenObj(null)} />}
      {/* Ссылка вида #catalog/<id объекта> открывает сразу нужную карточку — можно скопировать из адресной строки */}
      {addOpen && <AddObjectModal onClose={() => setAddOpen(false)} />}
    </div>);

}

/* ── Подвал сайта — реквизиты компании, ссылка на политику конфиденциальности ── */
function SiteFooter() {
  const credits = [
    { label: 'Руководитель проекта', names: ['Александр Ивакин'] },
    { label: 'Автор идеи', names: ['Ксюша Сидорина'] },
    { label: 'Команда исследования', names: ['Анна Селиванова', 'Алёна Лобачева', 'Глеб Глазунов'] },
    { label: 'Дизайнер', names: ['Ксения Платонова'] },
  ];
  return (
    <footer style={{ background:'#0A0A0A', color:'#fff', padding:'72px 32px 48px' }}>

// Подушка безопасности: если где-то в дереве компонентов произойдёт ошибка,
// без этой обёртки React убирает вообще всё со страницы. С ней — показываем
// понятный экран вместо белого.
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error('Поймана ошибка рендера:', error, info); }
  render() {
    if (this.state.error) {
      const goHome = () => { window.location.hash = 'catalog'; window.location.reload(); };
      return (
        <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:18, padding:24, textAlign:'center', background:'var(--bg, #F6F6F6)' }}>
          <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.3" style={{ color:'var(--ink-3, #9a9a9a)' }}>
            <path d="M3 11.5L12 4l9 7.5" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M5.5 9.5V20h13V9.5" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M9.5 20v-6h5v6" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
          <div className="mono" style={{ fontSize:12, letterSpacing:'.08em', color:'var(--ink-3, #9a9a9a)' }}>ДОМ ВДАЛИ</div>
          <h1 className="h-title" style={{ fontSize:26, margin:0 }}>Страница не открылась</h1>
          <div style={{ fontSize:15, color:'var(--ink-2, #555)', maxWidth:420, lineHeight:1.5 }}>
            Что-то пошло не так. Возможно, вы перешли по устаревшей ссылке или на странице произошла временная ошибка.
          </div>
          <div style={{ display:'flex', gap:12, flexWrap:'wrap', justifyContent:'center' }}>
            <button className="btn btn-ghost" onClick={() => this.setState({ error: null })}>Попробовать снова</button>
            <button className="btn btn-primary" onClick={goHome}>В каталог</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App /></ErrorBoundary>);
